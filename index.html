<style>
/* ===== DARK THEME ===== */
[data-theme="dark"] {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #222222;
  --surface3: #2c2c2c;
  --border: #2e2e2e;
  --border2: #3a3a3a;
  --accent: #e53935;
  --accent-hover: #c62828;
  --accent-soft: rgba(229,57,53,0.12);
  --text: #f2f2f2;
  --text2: #999;
  --text3: #555;
  --green: #43a047;
  --yellow: #f9a825;
  --blue: #1e88e5;
  --shadow: 0 6px 32px rgba(0,0,0,0.5);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  --theme-icon: "☀️";
}
/* ===== LIGHT THEME ===== */
[data-theme="light"] {
  --bg: #f4f4f5;
  --surface: #ffffff;
  --surface2: #f8f8f9;
  --surface3: #ececee;
  --border: #e2e2e5;
  --border2: #d0d0d4;
  --accent: #e53935;
  --accent-hover: #c62828;
  --accent-soft: rgba(229,57,53,0.08);
  --text: #111111;
  --text2: #666;
  --text3: #aaa;
  --green: #388e3c;
  --yellow: #f57f17;
  --blue: #1565c0;
  --shadow: 0 4px 20px rgba(0,0,0,0.10);
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.07);
  --theme-icon: "🌙";
}

--radius: 10px;
--radius-sm: 6px;

* { box-sizing: border-box; margin: 0; padding: 0; }

:root { --radius: 10px; --radius-sm: 6px; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  overflow: hidden;
  transition: background 0.2s, color 0.2s;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 248px; min-width: 248px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  height: 100vh; overflow-y: auto;
  transition: background 0.2s, border-color 0.2s;
}

.sidebar-logo {
  padding: 18px 18px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.logo-mark {
  width: 34px; height: 34px;
  background: var(--accent);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-mark svg { width: 18px; height: 18px; fill: white; }
.logo-wordmark {
  font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: 15px;
  letter-spacing: -0.3px;
  color: var(--text);
}
.logo-wordmark em {
  font-style: normal;
  color: var(--accent);
}

.theme-toggle {
  margin-left: auto;
  width: 30px; height: 30px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: all 0.15s;
  flex-shrink: 0;
}
.theme-toggle:hover { background: var(--surface3); border-color: var(--border2); }

.sidebar-section { padding: 14px 10px 6px; }
.section-label {
  font-size: 9.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--text3); padding: 0 8px 8px;
}

.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 9px; border-radius: 7px;
  cursor: pointer; transition: all 0.12s;
  font-size: 13.5px; color: var(--text2);
  user-select: none;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 500; }
.nav-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }

.spaces-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 8px 8px;
}
.spaces-title { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text3); }
.add-space-icon {
  width: 18px; height: 18px;
  border-radius: 4px; border: 1px solid var(--border);
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 13px; color: var(--text3);
  transition: all 0.12s; line-height: 1;
}
.add-space-icon:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

.space-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 9px; border-radius: 7px;
  cursor: pointer; transition: all 0.12s;
  font-size: 13px; color: var(--text2);
  user-select: none; group: space;
}
.space-item:hover { background: var(--surface2); color: var(--text); }
.space-item.active { background: var(--accent-soft); color: var(--text); }
.space-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.space-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.space-count { font-size: 11px; color: var(--text3); }
.space-del {
  display: none; background: none; border: none;
  color: var(--text3); cursor: pointer; font-size: 13px;
  padding: 1px 3px; border-radius: 3px; line-height: 1;
}
.space-item:hover .space-del { display: block; }
.space-del:hover { color: #ef5350; background: rgba(229,57,53,0.1); }

/* ===== MAIN ===== */
.main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 22px;
  height: 54px;
  display: flex; align-items: center; gap: 14px;
  flex-shrink: 0;
  transition: background 0.2s;
}
.topbar-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700; font-size: 17px;
  flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.view-tabs {
  display: flex; gap: 2px;
  background: var(--surface2);
  padding: 3px; border-radius: 7px;
  border: 1px solid var(--border);
}
.view-tab {
  padding: 5px 11px; border-radius: 5px;
  cursor: pointer; font-size: 12.5px;
  color: var(--text2); transition: all 0.12s; user-select: none;
}
.view-tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm); font-weight: 500; }
.view-tab:hover:not(.active) { color: var(--text); }

.btn {
  padding: 7px 14px; border-radius: 7px;
  font-size: 13px; font-weight: 500;
  cursor: pointer; border: none;
  transition: all 0.12s;
  font-family: 'DM Sans', sans-serif;
  white-space: nowrap;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-ghost {
  background: transparent; color: var(--text2);
  border: 1px solid var(--border);
}
.btn-ghost:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }
.btn-danger { background: transparent; color: #ef5350; border: 1px solid rgba(239,83,80,0.3); }
.btn-danger:hover { background: rgba(239,83,80,0.1); }

.content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

/* ===== KANBAN ===== */
.kanban-board {
  display: flex; gap: 14px;
  padding: 18px 22px;
  overflow-x: auto; height: 100%;
  align-items: flex-start;
}
.kanban-col {
  min-width: 272px; max-width: 272px;
  background: var(--surface);
  border-radius: 10px;
  border: 1px solid var(--border);
  display: flex; flex-direction: column;
  max-height: calc(100vh - 116px);
  transition: background 0.2s;
}
.kanban-col-header {
  padding: 13px 14px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.col-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.col-title { font-weight: 600; font-size: 13px; flex: 1; }
.col-count {
  font-size: 11px; color: var(--text3);
  background: var(--surface2);
  padding: 2px 7px; border-radius: 8px;
}
.kanban-col-body {
  padding: 10px; overflow-y: auto; flex: 1;
  display: flex; flex-direction: column; gap: 7px;
}
.add-task-col-btn {
  margin: 6px 10px 10px; padding: 7px 10px;
  border-radius: 7px;
  border: 1px dashed var(--border2);
  background: transparent; color: var(--text3);
  cursor: pointer; font-size: 12.5px;
  display: flex; align-items: center; gap: 6px;
  transition: all 0.12s; font-family: 'DM Sans', sans-serif;
}
.add-task-col-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
}

/* ===== TASK CARD ===== */
.task-card {
  background: var(--surface2);
  border-radius: 8px; padding: 11px 12px;
  border: 1px solid var(--border);
  cursor: pointer; transition: all 0.15s;
}
.task-card:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}
.task-card-title { font-size: 13px; font-weight: 500; line-height: 1.45; margin-bottom: 9px; }
.task-card-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }

.priority-badge {
  font-size: 9.5px; font-weight: 700;
  padding: 2px 6px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.priority-urgent { background: rgba(229,57,53,0.15); color: #ef5350; }
.priority-high { background: rgba(251,140,0,0.15); color: #fb8c00; }
.priority-normal { background: rgba(30,136,229,0.15); color: #42a5f5; }
.priority-low { background: rgba(120,120,120,0.15); color: #888; }

.due-badge { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 3px; }
.due-badge.overdue { color: #ef5350; }
.comment-count { font-size: 11px; color: var(--text3); margin-left: auto; }
.task-project-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 500; }

/* ===== LIST VIEW ===== */
.list-view { padding: 0 22px 24px; overflow-y: auto; height: 100%; }
.list-header-row {
  display: grid;
  grid-template-columns: 22px 1fr 130px 110px 90px 44px;
  gap: 12px; padding: 8px 12px; margin-bottom: 2px;
}
.list-header-cell { font-size: 10.5px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; }
.list-group { margin-bottom: 22px; }
.list-group-header {
  display: flex; align-items: center; gap: 9px;
  padding: 10px 2px 8px;
  border-bottom: 2px solid var(--border);
  margin-bottom: 4px;
}
.list-group-title { font-weight: 700; font-size: 13.5px; font-family: 'Syne', sans-serif; }
.list-group-count { font-size: 11.5px; color: var(--text3); }
.list-row {
  display: grid;
  grid-template-columns: 22px 1fr 130px 110px 90px 44px;
  align-items: center; gap: 12px;
  padding: 9px 12px;
  border-radius: 7px;
  cursor: pointer; transition: background 0.1s;
  border-bottom: 1px solid var(--border);
}
.list-row:hover { background: var(--surface2); }
.list-row:last-child { border-bottom: none; }
.list-row-check {
  width: 17px; height: 17px;
  border: 2px solid var(--border2);
  border-radius: 4px; cursor: pointer;
  flex-shrink: 0; transition: all 0.12s;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: white;
}
.list-row-check.done { background: var(--green); border-color: var(--green); }
.list-row-title { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.list-row-title.done-text { text-decoration: line-through; color: var(--text3); }
.list-row-project { font-size: 12px; }
.list-row-due { font-size: 12px; color: var(--text2); }
.list-row-due.overdue { color: #ef5350; }
.icon-btn {
  background: none; border: none; color: var(--text3);
  cursor: pointer; padding: 4px 6px; border-radius: 4px;
  transition: all 0.12s; font-size: 13px;
}
.icon-btn:hover { background: var(--surface3); color: var(--text); }

/* ===== CALENDAR ===== */
.calendar-view { padding: 18px 22px; overflow-y: auto; height: 100%; }
.cal-header {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 18px;
}
.cal-month { font-family: 'Syne', sans-serif; font-size: 19px; font-weight: 700; flex: 1; }
.cal-grid {
  display: grid; grid-template-columns: repeat(7,1fr);
  gap: 1px; background: var(--border);
  border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
}
.cal-day-name {
  background: var(--surface);
  padding: 9px; text-align: center;
  font-size: 10.5px; font-weight: 700;
  text-transform: uppercase; color: var(--text3); letter-spacing: .8px;
}
.cal-day {
  background: var(--surface);
  min-height: 86px; padding: 8px;
  cursor: pointer; transition: background 0.1s;
}
.cal-day:hover { background: var(--surface2); }
.cal-day.today { background: var(--accent-soft); }
.cal-day.other-month .cal-day-num { color: var(--text3); }
.cal-day-num {
  font-size: 12px; font-weight: 600; margin-bottom: 5px;
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
}
.cal-day.today .cal-day-num { background: var(--accent); color: white; }
.cal-task-chip {
  font-size: 10px; padding: 2px 6px; border-radius: 3px;
  margin-bottom: 2px; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
  cursor: pointer;
}
.cal-task-chip.priority-urgent { background: rgba(229,57,53,0.18); color: #ef9a9a; }
.cal-task-chip.priority-high { background: rgba(251,140,0,0.18); color: #ffcc80; }
.cal-task-chip.priority-normal { background: rgba(30,136,229,0.18); color: #90caf9; }
.cal-task-chip.priority-low { background: rgba(120,120,120,0.15); color: #888; }

/* ===== PROJECTS VIEW ===== */
.projects-view { padding: 18px 22px; overflow-y: auto; height: 100%; }
.projects-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.projects-heading { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; }
.projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px,1fr)); gap: 14px; }
.project-card {
  background: var(--surface);
  border-radius: 10px; padding: 18px;
  border: 1px solid var(--border);
  cursor: pointer; transition: all 0.18s;
  position: relative;
}
.project-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow); }
.project-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
.project-card-left { display: flex; align-items: center; gap: 9px; }
.project-card-dot { width: 13px; height: 13px; border-radius: 4px; flex-shrink: 0; }
.project-card-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14.5px; }
.project-card-del {
  background: none; border: none; color: var(--text3);
  cursor: pointer; font-size: 14px; padding: 2px 4px;
  border-radius: 4px; transition: all 0.12s; opacity: 0;
}
.project-card:hover .project-card-del { opacity: 1; }
.project-card-del:hover { color: #ef5350; background: rgba(239,83,80,0.1); }
.project-card-sub { font-size: 12px; color: var(--text3); margin-bottom: 14px; }
.project-card-stats { display: flex; gap: 14px; margin-bottom: 14px; }
.proj-stat { text-align: center; }
.proj-stat-num { font-size: 22px; font-weight: 800; font-family: 'Syne', sans-serif; }
.proj-stat-label { font-size: 10.5px; color: var(--text3); }
.progress-bar { height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
.progress-label { font-size: 10.5px; color: var(--text3); margin-bottom: 5px; display: flex; justify-content: space-between; }

.new-project-card {
  background: var(--surface);
  border-radius: 10px; padding: 18px;
  border: 2px dashed var(--border2);
  cursor: pointer; transition: all 0.18s;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 160px; gap: 7px; color: var(--text3);
}
.new-project-card:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
.new-project-card .plus { font-size: 26px; font-weight: 300; }
.new-project-card .new-label { font-size: 13px; font-weight: 600; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  animation: fadeIn 0.12s ease;
  backdrop-filter: blur(2px);
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--surface);
  border-radius: 12px; width: 100%; max-width: 520px;
  border: 1px solid var(--border2);
  animation: slideUp 0.18s ease;
  max-height: 92vh; overflow-y: auto;
  box-shadow: var(--shadow);
  transition: background 0.2s;
}
@keyframes slideUp {
  from { transform: translateY(16px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.modal-header {
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15.5px; }
.modal-close {
  background: none; border: none; color: var(--text2);
  cursor: pointer; font-size: 18px; padding: 4px 6px;
  border-radius: 5px; line-height: 1; transition: all 0.12s;
}
.modal-close:hover { background: var(--surface2); color: var(--text); }
.modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; }
.modal-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 8px;
}

/* ===== TASK DETAIL MODAL ===== */
.modal-task { max-width: 660px; }
.task-detail-title {
  background: none; border: none; color: var(--text);
  font-size: 18px; font-weight: 700;
  font-family: 'Syne', sans-serif;
  width: 100%; outline: none; padding: 2px 0;
  border-bottom: 2px solid transparent;
  transition: border-color 0.15s;
}
.task-detail-title:focus { border-color: var(--accent); }
.task-meta-row { display: flex; flex-wrap: wrap; gap: 14px; }
.task-meta-item { display: flex; flex-direction: column; gap: 5px; }
.task-meta-label { font-size: 10px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
.task-description {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px; color: var(--text);
  padding: 11px 12px; font-size: 13.5px;
  font-family: 'DM Sans', sans-serif;
  min-height: 90px; resize: vertical;
  outline: none; width: 100%;
  transition: border-color 0.12s;
}
.task-description:focus { border-color: var(--accent); }

.comments-title { font-size: 12.5px; font-weight: 600; color: var(--text2); margin-bottom: 10px; }
.comment-item { display: flex; gap: 9px; margin-bottom: 10px; }
.comment-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800; color: white; flex-shrink: 0;
}
.comment-bubble { flex: 1; }
.comment-meta { font-size: 10.5px; color: var(--text3); margin-bottom: 3px; }
.comment-text {
  font-size: 13px;
  background: var(--surface2);
  padding: 8px 11px; border-radius: 7px; line-height: 1.5;
}
.comment-input-row { display: flex; gap: 9px; align-items: flex-end; margin-top: 10px; }
.comment-input {
  flex: 1; background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px; color: var(--text);
  padding: 8px 11px; font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  outline: none; resize: none;
  min-height: 36px; transition: border-color 0.12s;
}
.comment-input:focus { border-color: var(--accent); }

/* ===== FORM ELEMENTS ===== */
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
.form-input, .form-textarea, .form-select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px; color: var(--text);
  padding: 8px 11px; font-size: 13.5px;
  font-family: 'DM Sans', sans-serif;
  transition: border-color 0.12s; outline: none; width: 100%;
}
.form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent); }
.form-textarea { min-height: 76px; resize: vertical; }
.form-select { cursor: pointer; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }

.color-picker { display: flex; gap: 7px; flex-wrap: wrap; }
.color-dot-pick {
  width: 24px; height: 24px; border-radius: 50%;
  cursor: pointer; transition: all 0.12s;
  border: 3px solid transparent; outline: 2px solid transparent;
}
.color-dot-pick:hover { transform: scale(1.15); }
.color-dot-pick.selected { outline: 2px solid var(--text); outline-offset: 2px; transform: scale(1.1); }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 22px; right: 22px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px; padding: 11px 15px;
  font-size: 13px; z-index: 9999;
  animation: slideUp 0.18s ease;
  display: flex; align-items: center; gap: 8px;
  box-shadow: var(--shadow);
}
.toast.success { border-left: 3px solid var(--green); }
.toast.error { border-left: 3px solid var(--accent); }

.empty-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 160px; color: var(--text3); gap: 7px;
}
.empty-state-icon { font-size: 28px; opacity: 0.5; }
.empty-state-text { font-size: 13px; }

/* STATUS colors for select options */
.status-dot-pendiente { color: #666; }
.status-dot-en-progreso { color: #1e88e5; }
.status-dot-revision { color: #f9a825; }
.status-dot-completado { color: #43a047; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <svg viewBox="0 0 20 20"><path d="M3 5h14v2H3zm0 4h14v2H3zm0 4h9v2H3z"/></svg>
    </div>
    <div class="logo-wordmark">click<em>.1986</em></div>
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="Cambiar tema">☀️</button>
  </div>

  <div class="sidebar-section">
    <div class="section-label">Vistas</div>
    <div class="nav-item active" id="nav-kanban" onclick="setView('kanban',this)">
      <span class="nav-icon">⬜</span> Kanban
    </div>
    <div class="nav-item" id="nav-list" onclick="setView('list',this)">
      <span class="nav-icon">≡</span> Lista
    </div>
    <div class="nav-item" id="nav-calendar" onclick="setView('calendar',this)">
      <span class="nav-icon">◻</span> Calendario
    </div>
    <div class="nav-item" id="nav-projects" onclick="setView('projects',this)">
      <span class="nav-icon">⬡</span> Espacios
    </div>
  </div>

  <div class="sidebar-section" style="flex:1">
    <div class="spaces-header">
      <span class="spaces-title">Mis espacios</span>
      <div class="add-space-icon" onclick="openProjectModal()" title="Nuevo espacio">+</div>
    </div>
    <div id="sidebar-spaces"></div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div class="topbar-title" id="view-title">Kanban</div>
    <div class="view-tabs">
      <div class="view-tab active" id="tab-kanban" onclick="setView('kanban',null,this)">⬜ Kanban</div>
      <div class="view-tab" id="tab-list" onclick="setView('list',null,this)">≡ Lista</div>
      <div class="view-tab" id="tab-calendar" onclick="setView('calendar',null,this)">◻ Cal</div>
      <div class="view-tab" id="tab-projects" onclick="setView('projects',null,this)">⬡ Espacios</div>
    </div>
    <button class="btn btn-ghost" onclick="enviarResumenTelegram()" title="Enviar resumen a Telegram" style="font-size:13px">📨 Telegram</button>
    <button class="btn btn-primary" onclick="openTaskModal()">+ Nueva tarea</button>
  </div>

  <div class="content" id="main-content"></div>
</main>

<div id="modal-container"></div>

<script>
// ======== CONSTANTS ========
const COLORS = ['#e53935','#fb8c00','#f9a825','#43a047','#1e88e5','#8e24aa','#00acc1','#6d4c41','#546e7a','#ec407a'];
const PRIORITIES = ['urgent','high','normal','low'];
const STATUSES = ['pendiente','en progreso','revisión','completado'];
const STATUS_COLORS = {
  'pendiente': '#666',
  'en progreso': '#1e88e5',
  'revisión': '#f9a825',
  'completado': '#43a047'
};
const STATUS_LABELS = {
  'pendiente': 'Pendiente',
  'en progreso': 'En Progreso',
  'revisión': 'Revisión',
  'completado': 'Completado'
};
const PRIORITY_LABELS = { urgent:'Urgente', high:'Alta', normal:'Normal', low:'Baja' };

// ======== STATE ========
let state = {
  projects: [],
  tasks: [],
  currentView: 'kanban',
  filterProject: null,
  calendarDate: new Date(),
  theme: 'dark',
};

function loadState() {
  try {
    const saved = localStorage.getItem('click1986_v2');
    if (saved) {
      const p = JSON.parse(saved);
      state.projects = p.projects || [];
      state.tasks = p.tasks || [];
      state.theme = p.theme || 'dark';
    }
  } catch(e) {}

  // Default: only "Personal" space
  if (!state.projects.length) {
    state.projects = [
      { id: uid(), name: 'Personal', color: '#1e88e5' }
    ];
    // Sample tasks in Personal
    const pid = state.projects[0].id;
    state.tasks = [
      makeTask('Mi primera tarea', 'Ejemplo de tarea en click.1986', 'normal', 'pendiente', pid, daysFromNow(3)),
    ];
    saveState();
  }

  applyTheme(state.theme);
}

function saveState() {
  localStorage.setItem('click1986_v2', JSON.stringify({
    projects: state.projects,
    tasks: state.tasks,
    theme: state.theme
  }));
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function daysFromNow(d) {
  const dt = new Date();
  dt.setDate(dt.getDate() + d);
  return dt.toISOString().slice(0,10);
}
function makeTask(title, desc, priority, status, projectId, due) {
  return { id: uid(), title, description: desc, priority, status, projectId, dueDate: due, comments: [], createdAt: new Date().toISOString() };
}
function getProject(id) { return state.projects.find(p => p.id === id); }
function formatDate(str) {
  if (!str) return '';
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('es-AR', { day: 'numeric', month: 'short' });
}
function isOverdue(str) {
  if (!str) return false;
  return new Date(str + 'T23:59:59') < new Date();
}
function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
function esc(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ======== THEME ========
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
}
function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  applyTheme(state.theme);
  saveState();
}

// ======== VIEWS ========
function setView(view, navEl, tabEl) {
  state.currentView = view;
  state.filterProject = null;

  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navMap = { kanban:'nav-kanban', list:'nav-list', calendar:'nav-calendar', projects:'nav-projects' };
  const nv = document.getElementById(navMap[view]);
  if (nv) nv.classList.add('active');
  else if (navEl) navEl.classList.add('active');

  document.querySelectorAll('.view-tab').forEach(el => el.classList.remove('active'));
  const tabMap = { kanban:'tab-kanban', list:'tab-list', calendar:'tab-calendar', projects:'tab-projects' };
  const tv = document.getElementById(tabMap[view]);
  if (tv) tv.classList.add('active');
  else if (tabEl) tabEl.classList.add('active');

  const titles = { kanban:'Kanban', list:'Lista de Tareas', calendar:'Calendario', projects:'Espacios' };
  document.getElementById('view-title').textContent = titles[view];
  renderContent();
}

function render() {
  renderSidebarSpaces();
  renderContent();
}

function renderContent() {
  renderSidebarSpaces();
  const c = document.getElementById('main-content');
  if (state.currentView === 'kanban') c.innerHTML = renderKanban();
  else if (state.currentView === 'list') c.innerHTML = renderList();
  else if (state.currentView === 'calendar') { c.innerHTML = renderCalendar(); bindCalendar(); }
  else if (state.currentView === 'projects') c.innerHTML = renderProjects();
}

// ======== SIDEBAR SPACES ========
function renderSidebarSpaces() {
  const el = document.getElementById('sidebar-spaces');
  if (!el) return;
  const counts = {};
  state.tasks.forEach(t => {
    if (t.status !== 'completado') counts[t.projectId] = (counts[t.projectId]||0) + 1;
  });
  el.innerHTML = state.projects.map(p => `
    <div class="space-item ${state.filterProject===p.id?'active':''}" onclick="filterBySpace('${p.id}')">
      <div class="space-dot" style="background:${p.color}"></div>
      <span class="space-name">${esc(p.name)}</span>
      <span class="space-count">${counts[p.id]||''}</span>
      <button class="space-del" onclick="event.stopPropagation();confirmDeleteSpace('${p.id}')" title="Eliminar espacio">✕</button>
    </div>
  `).join('');
}

function filterBySpace(id) {
  state.filterProject = state.filterProject === id ? null : id;
  renderContent();
}

// ======== KANBAN ========
function renderKanban() {
  let tasks = state.tasks;
  if (state.filterProject) tasks = tasks.filter(t => t.projectId === state.filterProject);
  return `<div class="kanban-board">
    ${STATUSES.map(status => {
      const col = tasks.filter(t => t.status === status);
      return `<div class="kanban-col">
        <div class="kanban-col-header">
          <div class="col-dot" style="background:${STATUS_COLORS[status]}"></div>
          <div class="col-title">${STATUS_LABELS[status]}</div>
          <div class="col-count">${col.length}</div>
        </div>
        <div class="kanban-col-body">
          ${col.map(t => renderTaskCard(t)).join('')}
          ${col.length===0?`<div class="empty-state"><div class="empty-state-icon">○</div><div class="empty-state-text">Sin tareas</div></div>`:''}
        </div>
        <button class="add-task-col-btn" onclick="openTaskModal('${status}')">+ Agregar tarea</button>
      </div>`;
    }).join('')}
  </div>`;
}

function renderTaskCard(t) {
  const proj = getProject(t.projectId);
  const overdue = isOverdue(t.dueDate) && t.status !== 'completado';
  return `<div class="task-card" onclick="openTaskDetail('${t.id}')">
    <div class="task-card-title">${esc(t.title)}</div>
    <div class="task-card-meta">
      <span class="priority-badge priority-${t.priority}">${PRIORITY_LABELS[t.priority]}</span>
      ${t.dueDate?`<span class="due-badge ${overdue?'overdue':''}">📅 ${formatDate(t.dueDate)}</span>`:''}
      ${proj?`<span class="task-project-tag" style="background:${proj.color}20;color:${proj.color}">${esc(proj.name)}</span>`:''}
      ${t.comments.length?`<span class="comment-count" style="margin-left:auto">💬 ${t.comments.length}</span>`:''}
    </div>
  </div>`;
}

// ======== LIST ========
function renderList() {
  let tasks = state.tasks;
  if (state.filterProject) tasks = tasks.filter(t => t.projectId === state.filterProject);
  const grouped = {};
  STATUSES.forEach(s => grouped[s] = []);
  tasks.forEach(t => { if (grouped[t.status]) grouped[t.status].push(t); });

  return `<div class="list-view">
    <div class="list-header-row">
      <div></div>
      <div class="list-header-cell">Tarea</div>
      <div class="list-header-cell">Espacio</div>
      <div class="list-header-cell">Fecha límite</div>
      <div class="list-header-cell">Prioridad</div>
      <div></div>
    </div>
    ${STATUSES.map(status => {
      const col = grouped[status];
      return `<div class="list-group">
        <div class="list-group-header">
          <div class="col-dot" style="background:${STATUS_COLORS[status]};width:9px;height:9px;border-radius:50%;flex-shrink:0"></div>
          <div class="list-group-title">${STATUS_LABELS[status]}</div>
          <div class="list-group-count">${col.length}</div>
        </div>
        ${col.map(t => {
          const proj = getProject(t.projectId);
          const done = t.status === 'completado';
          const overdue = isOverdue(t.dueDate) && !done;
          return `<div class="list-row" onclick="openTaskDetail('${t.id}')">
            <div class="list-row-check ${done?'done':''}" onclick="event.stopPropagation();toggleDone('${t.id}')">${done?'✓':''}</div>
            <div class="list-row-title ${done?'done-text':''}">${esc(t.title)}</div>
            <div class="list-row-project">${proj?`<span style="background:${proj.color}20;color:${proj.color};padding:2px 8px;border-radius:4px;font-size:11.5px">${esc(proj.name)}</span>`:'-'}</div>
            <div class="list-row-due ${overdue?'overdue':''}">${t.dueDate?formatDate(t.dueDate):'-'}</div>
            <div><span class="priority-badge priority-${t.priority}">${PRIORITY_LABELS[t.priority]}</span></div>
            <div style="text-align:right">
              <button class="icon-btn" onclick="event.stopPropagation();deleteTask('${t.id}')" title="Eliminar">🗑</button>
            </div>
          </div>`;
        }).join('')}
        ${col.length===0?`<div style="padding:10px 12px;font-size:12px;color:var(--text3)">Sin tareas en este estado</div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}

// ======== CALENDAR ========
function renderCalendar() {
  const d = state.calendarDate;
  const year = d.getFullYear(), month = d.getMonth();
  const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const DAYS = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const today = new Date(); today.setHours(0,0,0,0);
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();

  const byDate = {};
  state.tasks.forEach(t => {
    if (t.dueDate) { byDate[t.dueDate] = byDate[t.dueDate]||[]; byDate[t.dueDate].push(t); }
  });

  let cells = '';
  for (let i = firstDay-1; i >= 0; i--) {
    cells += `<div class="cal-day other-month"><div class="cal-day-num">${daysInPrev-i}</div></div>`;
  }
  for (let day = 1; day <= daysInMonth; day++) {
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday = new Date(year,month,day).getTime() === today.getTime();
    const dt = byDate[ds]||[];
    cells += `<div class="cal-day ${isToday?'today':''}" onclick="openTaskModal(null,'${ds}')">
      <div class="cal-day-num">${day}</div>
      ${dt.slice(0,3).map(t=>`<div class="cal-task-chip priority-${t.priority}" onclick="event.stopPropagation();openTaskDetail('${t.id}')">${esc(t.title)}</div>`).join('')}
      ${dt.length>3?`<div style="font-size:10px;color:var(--text3)">+${dt.length-3} más</div>`:''}
    </div>`;
  }
  const total = Math.ceil((firstDay+daysInMonth)/7)*7;
  for (let i=1; i<=total-firstDay-daysInMonth; i++) {
    cells += `<div class="cal-day other-month"><div class="cal-day-num">${i}</div></div>`;
  }

  return `<div class="calendar-view">
    <div class="cal-header">
      <button class="btn btn-ghost" id="cal-prev">‹ Anterior</button>
      <div class="cal-month">${MONTHS[month]} ${year}</div>
      <button class="btn btn-ghost" id="cal-next">Siguiente ›</button>
    </div>
    <div class="cal-grid">
      ${DAYS.map(n=>`<div class="cal-day-name">${n}</div>`).join('')}
      ${cells}
    </div>
  </div>`;
}
function bindCalendar() {
  document.getElementById('cal-prev').onclick = () => {
    const d = state.calendarDate;
    state.calendarDate = new Date(d.getFullYear(), d.getMonth()-1, 1);
    renderContent();
  };
  document.getElementById('cal-next').onclick = () => {
    const d = state.calendarDate;
    state.calendarDate = new Date(d.getFullYear(), d.getMonth()+1, 1);
    renderContent();
  };
}

// ======== PROJECTS VIEW ========
function renderProjects() {
  return `<div class="projects-view">
    <div class="projects-top">
      <div class="projects-heading">Mis Espacios</div>
      <button class="btn btn-primary" onclick="openProjectModal()">+ Nuevo espacio</button>
    </div>
    <div class="projects-grid">
      ${state.projects.map(p => {
        const tasks = state.tasks.filter(t => t.projectId === p.id);
        const done = tasks.filter(t => t.status === 'completado').length;
        const active = tasks.filter(t => t.status !== 'completado').length;
        const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;
        return `<div class="project-card" onclick="filterBySpace('${p.id}');setView('kanban')">
          <div class="project-card-top">
            <div class="project-card-left">
              <div class="project-card-dot" style="background:${p.color}"></div>
              <div class="project-card-name">${esc(p.name)}</div>
            </div>
            <button class="project-card-del" onclick="event.stopPropagation();confirmDeleteSpace('${p.id}')" title="Eliminar espacio">✕</button>
          </div>
          <div class="project-card-sub">${tasks.length} tarea${tasks.length!==1?'s':''} · ${active} activa${active!==1?'s':''}</div>
          <div class="project-card-stats">
            <div class="proj-stat">
              <div class="proj-stat-num" style="color:${p.color}">${active}</div>
              <div class="proj-stat-label">Activas</div>
            </div>
            <div class="proj-stat">
              <div class="proj-stat-num" style="color:var(--green)">${done}</div>
              <div class="proj-stat-label">Listas</div>
            </div>
            <div class="proj-stat">
              <div class="proj-stat-num">${pct}%</div>
              <div class="proj-stat-label">Progreso</div>
            </div>
          </div>
          <div>
            <div class="progress-label"><span>Avance</span><span>${pct}%</span></div>
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${p.color}"></div></div>
          </div>
        </div>`;
      }).join('')}
      <div class="new-project-card" onclick="openProjectModal()">
        <div class="plus">+</div>
        <div class="new-label">Nuevo espacio</div>
        <div style="font-size:11px;opacity:.6">Creá un espacio para organizar tus tareas</div>
      </div>
    </div>
  </div>`;
}

// ======== DELETE SPACE ========
function confirmDeleteSpace(id) {
  const proj = getProject(id);
  if (!proj) return;
  const taskCount = state.tasks.filter(t => t.projectId === id).length;
  const msg = taskCount > 0
    ? `¿Eliminar el espacio "${proj.name}"? También se eliminarán ${taskCount} tarea${taskCount!==1?'s':''}.`
    : `¿Eliminar el espacio "${proj.name}"?`;

  const container = document.getElementById('modal-container');
  container.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal" style="max-width:400px">
        <div class="modal-header">
          <div class="modal-title">Eliminar espacio</div>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
          <p style="font-size:14px;line-height:1.6;color:var(--text2)">${msg}</p>
          ${taskCount>0?`<p style="font-size:12px;color:#ef5350;margin-top:4px">Esta acción no se puede deshacer.</p>`:''}
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-danger" onclick="deleteSpace('${id}')">Sí, eliminar</button>
        </div>
      </div>
    </div>`;
}

function deleteSpace(id) {
  if (state.filterProject === id) state.filterProject = null;
  state.projects = state.projects.filter(p => p.id !== id);
  state.tasks = state.tasks.filter(t => t.projectId !== id);
  saveState();
  closeModal();
  render();
  showToast('Espacio eliminado');
}

// ======== TASK MODAL ========
function openTaskModal(defaultStatus, defaultDate) {
  const defaultProject = state.filterProject || (state.projects[0]?.id || '');
  createModal('Nueva Tarea', `
    <div class="form-group">
      <label class="form-label">Título *</label>
      <input class="form-input" id="t-title" placeholder="¿Qué hay que hacer?" autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">Descripción</label>
      <textarea class="form-textarea" id="t-desc" placeholder="Detalles opcionales..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Estado</label>
        <select class="form-select" id="t-status">
          ${STATUSES.map(s=>`<option value="${s}" ${s===(defaultStatus||'pendiente')?'selected':''}>${STATUS_LABELS[s]}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Prioridad</label>
        <select class="form-select" id="t-priority">
          ${PRIORITIES.map(p=>`<option value="${p}">${PRIORITY_LABELS[p]}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Espacio</label>
        <select class="form-select" id="t-project">
          ${state.projects.map(p=>`<option value="${p.id}" ${p.id===defaultProject?'selected':''}>${esc(p.name)}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Fecha límite</label>
        <input class="form-input" type="date" id="t-due" value="${defaultDate||''}">
      </div>
    </div>
  `, () => {
    const title = document.getElementById('t-title').value.trim();
    if (!title) { showToast('Ingresá un título','error'); return; }
    state.tasks.push({
      id: uid(), title,
      description: document.getElementById('t-desc').value,
      status: document.getElementById('t-status').value,
      priority: document.getElementById('t-priority').value,
      projectId: document.getElementById('t-project').value,
      dueDate: document.getElementById('t-due').value,
      comments: [],
      createdAt: new Date().toISOString(),
    });
    saveState(); closeModal(); render();
    showToast('✓ Tarea creada', 'success');
  }, 'Crear tarea');
}

// ======== TASK DETAIL ========
function openTaskDetail(taskId) {
  const task = state.tasks.find(t => t.id === taskId);
  if (!task) return;
  const container = document.getElementById('modal-container');
  container.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this){saveTaskDetail('${taskId}');closeModal()}">
      <div class="modal modal-task">
        <div class="modal-header">
          <input class="task-detail-title" id="dt-title" value="${esc(task.title)}" placeholder="Título de la tarea">
          <button class="modal-close" onclick="saveTaskDetail('${taskId}');closeModal()">✕</button>
        </div>
        <div class="modal-body">
          <div class="task-meta-row">
            <div class="task-meta-item">
              <span class="task-meta-label">Estado</span>
              <select class="form-select" style="padding:6px 9px;font-size:12.5px" id="dt-status">
                ${STATUSES.map(s=>`<option value="${s}" ${task.status===s?'selected':''}>${STATUS_LABELS[s]}</option>`).join('')}
              </select>
            </div>
            <div class="task-meta-item">
              <span class="task-meta-label">Prioridad</span>
              <select class="form-select" style="padding:6px 9px;font-size:12.5px" id="dt-priority">
                ${PRIORITIES.map(p=>`<option value="${p}" ${task.priority===p?'selected':''}>${PRIORITY_LABELS[p]}</option>`).join('')}
              </select>
            </div>
            <div class="task-meta-item">
              <span class="task-meta-label">Espacio</span>
              <select class="form-select" style="padding:6px 9px;font-size:12.5px" id="dt-project">
                ${state.projects.map(p=>`<option value="${p.id}" ${task.projectId===p.id?'selected':''}>${esc(p.name)}</option>`).join('')}
              </select>
            </div>
            <div class="task-meta-item">
              <span class="task-meta-label">Fecha límite</span>
              <input type="date" class="form-input" style="padding:6px 9px;font-size:12.5px;width:auto" id="dt-due" value="${task.dueDate||''}">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Descripción</label>
            <textarea class="task-description" id="dt-desc">${esc(task.description||'')}</textarea>
          </div>
          <div>
            <div class="comments-title">💬 Comentarios <span style="color:var(--text3)">(${task.comments.length})</span></div>
            <div id="comments-list">
              ${renderComments(task.comments)}
            </div>
            <div class="comment-input-row">
              <textarea class="comment-input" id="new-comment" placeholder="Escribí un comentario..." rows="1"></textarea>
              <button class="btn btn-primary" onclick="addComment('${taskId}')">Enviar</button>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-danger" onclick="deleteTask('${taskId}');closeModal()">🗑 Eliminar</button>
          <button class="btn btn-ghost" onclick="saveTaskDetail('${taskId}');closeModal()">Guardar y cerrar</button>
        </div>
      </div>
    </div>`;
}

function renderComments(comments) {
  if (!comments.length) return `<div style="font-size:12.5px;color:var(--text3);padding:8px 0">Sin comentarios aún.</div>`;
  return comments.map(c => `
    <div class="comment-item">
      <div class="comment-avatar">L</div>
      <div class="comment-bubble">
        <div class="comment-meta">${new Date(c.createdAt).toLocaleString('es-AR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div>
        <div class="comment-text">${esc(c.text)}</div>
      </div>
    </div>
  `).join('');
}

function saveTaskDetail(taskId) {
  const task = state.tasks.find(t => t.id === taskId);
  if (!task) return;
  const title = document.getElementById('dt-title')?.value?.trim();
  if (title) task.title = title;
  task.status = document.getElementById('dt-status')?.value || task.status;
  task.priority = document.getElementById('dt-priority')?.value || task.priority;
  task.projectId = document.getElementById('dt-project')?.value || task.projectId;
  task.dueDate = document.getElementById('dt-due')?.value || '';
  task.description = document.getElementById('dt-desc')?.value || '';
  saveState(); render();
}

function addComment(taskId) {
  const input = document.getElementById('new-comment');
  const text = input.value.trim();
  if (!text) return;
  const task = state.tasks.find(t => t.id === taskId);
  if (task) {
    task.comments.push({ id: uid(), text, createdAt: new Date().toISOString() });
    saveState();
    input.value = '';
    document.getElementById('comments-list').innerHTML = renderComments(task.comments);
    const titleEl = document.querySelector('.comments-title');
    if (titleEl) titleEl.innerHTML = `💬 Comentarios <span style="color:var(--text3)">(${task.comments.length})</span>`;
  }
}

function toggleDone(taskId) {
  const task = state.tasks.find(t => t.id === taskId);
  if (task) {
    task.status = task.status === 'completado' ? 'pendiente' : 'completado';
    saveState(); render();
  }
}

function deleteTask(taskId) {
  state.tasks = state.tasks.filter(t => t.id !== taskId);
  saveState(); render();
  showToast('Tarea eliminada');
}

// ======== PROJECT MODAL ========
function openProjectModal() {
  createModal('Nuevo Espacio', `
    <div class="form-group">
      <label class="form-label">Nombre del espacio *</label>
      <input class="form-input" id="p-name" placeholder="Ej: Trabajo, Proyectos, Ideas..." autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">Color</label>
      <div class="color-picker">
        ${COLORS.map((c,i) => `<div class="color-dot-pick ${i===0?'selected':''}" style="background:${c}" onclick="selectColor(this)"></div>`).join('')}
      </div>
    </div>
  `, () => {
    const name = document.getElementById('p-name').value.trim();
    if (!name) { showToast('Ingresá un nombre','error'); return; }
    const selected = document.querySelector('.color-dot-pick.selected');
    const color = selected ? selected.style.background : COLORS[0];
    state.projects.push({ id: uid(), name, color });
    saveState(); closeModal(); render();
    showToast('✓ Espacio creado', 'success');
  }, 'Crear espacio');
}

function selectColor(el) {
  document.querySelectorAll('.color-dot-pick').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
}

// ======== MODAL HELPERS ========
function createModal(title, body, onConfirm, confirmText='Guardar') {
  const container = document.getElementById('modal-container');
  container.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${title}</div>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">${body}</div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-primary" id="modal-confirm">${confirmText}</button>
        </div>
      </div>
    </div>`;
  document.getElementById('modal-confirm').onclick = onConfirm;
  setTimeout(() => {
    container.querySelectorAll('input[type="text"], input:not([type])').forEach(inp => {
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') onConfirm(); });
    });
  }, 50);
}

function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
}

// ======== TOAST ========
function showToast(msg, type='') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

function checkDueTasks() {
  const today = new Date().toISOString().slice(0,10);
  const tomorrow = new Date(Date.now() + 86400000).toISOString().slice(0,10);

  const todayTasks    = state.tasks.filter(t => t.dueDate === today    && t.status !== 'completado');
  const tomorrowTasks = state.tasks.filter(t => t.dueDate === tomorrow && t.status !== 'completado');
  const overdueTasks  = state.tasks.filter(t => t.dueDate && t.dueDate < today && t.status !== 'completado');

  let msg = '';

  if (overdueTasks.length) {
    msg += `🔴 <b>VENCIDAS (${overdueTasks.length})</b>\n`;
    overdueTasks.forEach(t => {
      const proj = getProject(t.projectId);
      msg += `• ${t.title}${proj?' — '+proj.name:''} (venció ${formatDate(t.dueDate)})\n`;
    });
    msg += '\n';
  }

  if (todayTasks.length) {
    msg += `🟡 <b>VENCEN HOY (${todayTasks.length})</b>\n`;
    todayTasks.forEach(t => {
      const proj = getProject(t.projectId);
      msg += `• ${t.title}${proj?' — '+proj.name:''}\n`;
    });
    msg += '\n';
  }

  if (tomorrowTasks.length) {
    msg += `🔵 <b>VENCEN MAÑANA (${tomorrowTasks.length})</b>\n`;
    tomorrowTasks.forEach(t => {
      const proj = getProject(t.projectId);
      msg += `• ${t.title}${proj?' — '+proj.name:''}\n`;
    });
  }

  if (msg) {
    msg = `📋 <b>click.1986 — Resumen de tareas</b>\n\n` + msg;
    sendTelegram(msg);
  }
}

function startNotificationScheduler() {
  const today = new Date().toISOString().slice(0,10);
  const lastCheck = localStorage.getItem('click1986_last_notif');
  if (lastCheck !== today) {
    setTimeout(() => {
      checkDueTasks();
      localStorage.setItem('click1986_last_notif', today);
    }, 3000);
  }
  setInterval(() => {
    const now = new Date().toISOString().slice(0,10);
    const last = localStorage.getItem('click1986_last_notif');
    if (last !== now) {
      checkDueTasks();
      localStorage.setItem('click1986_last_notif', now);
    }
  }, 3600000);
}

window.enviarResumenTelegram = function() {
  checkDueTasks();
  showToast('📨 Resumen enviado a Telegram', 'success');
}

// ======== PWA INSTALL PROMPT ========
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Mostrar botón instalar en topbar si aún no está instalado
  const topbar = document.querySelector('.topbar');
  if (topbar && !document.getElementById('install-btn')) {
    const btn = document.createElement('button');
    btn.id = 'install-btn';
    btn.className = 'btn btn-ghost';
    btn.style.cssText = 'font-size:12px;padding:5px 10px;border-color:var(--accent);color:var(--accent)';
    btn.innerHTML = '⬇ Instalar app';
    btn.onclick = () => {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => { deferredPrompt = null; btn.remove(); });
    };
    topbar.insertBefore(btn, topbar.querySelector('.btn-primary'));
  }
});
</script>
