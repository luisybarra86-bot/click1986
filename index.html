<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>click.1986</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="click.1986">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@egjs/hammerjs@2.0.17/hammer.min.js"></script>
<style>
/* ===== DARK THEME ===== */
[data-theme="dark"]{
  --bg:#0f172a;--surface:#111c31;--surface2:#17243c;--surface3:#22314d;
  --border:#23334f;--border2:#345071;
  --grad-start:#22d3ee;--grad-mid:#f97316;--grad-end:#84cc16;
  --accent:#22d3ee;--accent2:#f97316;--accent-hover:#0891b2;
  --accent-soft:rgba(34,211,238,0.13);
  --text:#f8fafc;--text2:#bac7d7;--text3:#72839a;
  --green:#22c55e;--yellow:#f59e0b;--blue:#38bdf8;--red:#f43f5e;
  --shadow:0 18px 42px rgba(2,6,23,0.48);--shadow-sm:0 8px 22px rgba(2,6,23,0.32);
  --sidebar-w:220px;--icon-w:52px;
}
/* ===== LIGHT THEME ===== */
[data-theme="light"]{
  --bg:#eef3f8;--surface:#ffffff;--surface2:#f5f8fb;--surface3:#e8eef5;
  --border:#dbe5ee;--border2:#b9c8d7;
  --grad-start:#0891b2;--grad-mid:#f97316;--grad-end:#65a30d;
  --accent:#0891b2;--accent2:#f97316;--accent-hover:#0e7490;
  --accent-soft:rgba(8,145,178,0.11);
  --text:#102033;--text2:#53657a;--text3:#8797a8;
  --green:#16a34a;--yellow:#d97706;--blue:#0284c7;--red:#e11d48;
  --shadow:0 14px 34px rgba(15,23,42,0.10);--shadow-sm:0 6px 18px rgba(15,23,42,0.08);
  --sidebar-w:220px;--icon-w:52px;
}
:root{--radius:10px;--radius-sm:6px;--font-body:'Inter',sans-serif;--font-display:'Space Grotesk',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-body);background:radial-gradient(circle at 20% 0%,rgba(34,211,238,0.10),transparent 28%),radial-gradient(circle at 90% 18%,rgba(249,115,22,0.10),transparent 24%),var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;transition:background .2s,color .2s;-webkit-font-smoothing:antialiased;text-rendering:geometricPrecision;}
body[data-density="compact"]{font-size:13px;}

/* ===== ICONS ===== */
.ui-icon{width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;color:currentColor;}
.ui-icon::before,.ui-icon::after{content:"";position:absolute;box-sizing:border-box;}
.ui-icon-dashboard::before{width:3px;height:11px;left:3px;bottom:3px;background:currentColor;border-radius:2px;box-shadow:5px -4px 0 currentColor,10px -1px 0 currentColor;}
.ui-icon-kanban::before{width:14px;height:12px;border:2px solid currentColor;border-radius:4px;}
.ui-icon-kanban::after{width:2px;height:12px;background:currentColor;box-shadow:5px 0 0 currentColor;opacity:.75;}
.ui-icon-list::before{width:13px;height:2px;background:currentColor;box-shadow:0 5px 0 currentColor,0 10px 0 currentColor;right:1px;top:3px;border-radius:2px;}
.ui-icon-list::after{width:3px;height:3px;background:currentColor;box-shadow:0 5px 0 currentColor,0 10px 0 currentColor;left:1px;top:2px;border-radius:50%;}
.ui-icon-calendar::before{width:14px;height:14px;border:2px solid currentColor;border-radius:4px;}
.ui-icon-calendar::after{width:10px;height:2px;background:currentColor;top:6px;border-radius:2px;}
.ui-icon-folder::before{width:15px;height:11px;border:2px solid currentColor;border-radius:3px;bottom:2px;}
.ui-icon-folder::after{width:7px;height:4px;border:2px solid currentColor;border-bottom:none;border-radius:3px 3px 0 0;left:2px;top:3px;}
.ui-icon-settings::before{width:14px;height:14px;border:2px solid currentColor;border-radius:50%;}
.ui-icon-settings::after{width:6px;height:6px;border:2px solid currentColor;border-radius:50%;}
.ui-icon-menu::before{width:14px;height:2px;background:currentColor;border-radius:2px;box-shadow:0 5px 0 currentColor,0 10px 0 currentColor;}
.ui-icon-search::before{width:9px;height:9px;border:2px solid currentColor;border-radius:50%;left:2px;top:2px;}
.ui-icon-search::after{width:7px;height:2px;background:currentColor;transform:rotate(45deg);right:1px;bottom:2px;border-radius:2px;}
.ui-icon-bell::before{width:12px;height:12px;border:2px solid currentColor;border-radius:8px 8px 4px 4px;top:2px;}
.ui-icon-bell::after{width:5px;height:2px;background:currentColor;bottom:1px;border-radius:2px;}
.ui-icon-plus::before{width:12px;height:2px;background:currentColor;border-radius:2px;}
.ui-icon-plus::after{width:2px;height:12px;background:currentColor;border-radius:2px;}
.ui-icon-check::before{width:10px;height:6px;border-left:2px solid currentColor;border-bottom:2px solid currentColor;transform:rotate(-45deg);top:4px;}
.ui-icon-clock::before{width:14px;height:14px;border:2px solid currentColor;border-radius:50%;}
.ui-icon-clock::after{width:5px;height:5px;border-left:2px solid currentColor;border-bottom:2px solid currentColor;transform:translate(1px,-1px);}
.ui-icon-alert::before{width:15px;height:15px;border:2px solid currentColor;border-radius:50%;}
.ui-icon-alert::after{width:2px;height:8px;background:currentColor;border-radius:2px;box-shadow:0 10px 0 currentColor;}
.ui-icon-comment::before{width:14px;height:11px;border:2px solid currentColor;border-radius:5px;}
.ui-icon-comment::after{width:6px;height:6px;border-left:2px solid currentColor;border-bottom:2px solid currentColor;transform:rotate(-25deg);left:3px;bottom:1px;}
.ui-icon-trash::before{width:12px;height:13px;border:2px solid currentColor;border-top:none;border-radius:0 0 3px 3px;bottom:1px;}
.ui-icon-trash::after{width:14px;height:2px;background:currentColor;top:3px;border-radius:2px;}
.ui-icon-edit::before{width:13px;height:4px;background:currentColor;border-radius:2px;transform:rotate(-35deg);}
.ui-icon-edit::after{width:5px;height:5px;border-left:2px solid currentColor;border-bottom:2px solid currentColor;left:2px;bottom:2px;}
.ui-icon-save::before{width:14px;height:14px;border:2px solid currentColor;border-radius:3px;}
.ui-icon-save::after{width:8px;height:4px;border:2px solid currentColor;border-top:none;bottom:3px;}
.ui-icon-upload::before{width:12px;height:9px;border:2px solid currentColor;border-top:none;bottom:2px;border-radius:0 0 3px 3px;}
.ui-icon-upload::after{width:8px;height:8px;border-left:2px solid currentColor;border-top:2px solid currentColor;transform:rotate(45deg);top:2px;}
.ui-icon-spark::before{width:14px;height:14px;background:linear-gradient(135deg,var(--grad-start),var(--grad-mid));border-radius:5px;transform:rotate(45deg);}

/* ===== NAV SIDEBAR ===== */
.nav-sidebar{width:var(--sidebar-w);background:color-mix(in srgb,var(--surface) 94%,transparent);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow-y:auto;transition:all .25s;z-index:100;flex-shrink:0;box-shadow:10px 0 30px rgba(2,6,23,0.14);}
.nav-sidebar.collapsed{width:0;min-width:0;overflow:hidden;}
.nav-header{padding:13px 14px 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0;}
.nav-avatar{width:28px;height:28px;background:linear-gradient(135deg,var(--grad-start),var(--grad-mid));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white;flex-shrink:0;}
.nav-workspace{font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--text);flex:1;white-space:nowrap;}
.theme-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .12s;flex-shrink:0;}
.theme-btn:hover{background:var(--surface3);}
.nav-section{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 5px;flex-shrink:0;}
.nav-section-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);}
.nav-section-add{width:16px;height:16px;border-radius:4px;border:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--text3);transition:all .12s;}
.nav-section-add:hover{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}
.nav-item{display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;transition:all .12s;color:var(--text2);user-select:none;border-radius:7px;margin:1px 6px;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--accent-soft);color:var(--accent);font-weight:500;}
.nav-icon{font-size:13px;width:18px;text-align:center;flex-shrink:0;}
.nav-label{font-size:12.5px;white-space:nowrap;}
.space-item{display:flex;align-items:center;gap:7px;padding:5px 12px 5px 20px;cursor:pointer;transition:all .12s;color:var(--text2);user-select:none;border-radius:7px;margin:1px 6px;}
.space-item:hover{background:var(--surface2);color:var(--text);}
.space-item.active{background:var(--accent-soft);color:var(--text);}
.space-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.space-name{font-size:12px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.space-count{font-size:10px;color:var(--text3);}
.space-actions{display:none;gap:2px;}
.space-item:hover .space-actions{display:flex;}
.space-act-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;padding:1px 3px;border-radius:3px;transition:all .12s;}
.space-act-btn:hover{color:var(--text2);background:var(--surface3);}
.space-act-btn.del:hover{color:#ef5350;background:rgba(229,57,53,0.1);}
.nav-bottom{margin-top:auto;border-top:1px solid var(--border);padding:8px 6px;}

/* ===== MAIN ===== */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0;}

/* ===== TOPBAR ===== */
.topbar{background:color-mix(in srgb,var(--surface) 95%,transparent);border-bottom:1px solid var(--border);padding:0 18px;height:52px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 8px 24px rgba(2,6,23,0.08);}
.menu-btn{width:30px;height:30px;border:1px solid var(--border);background:var(--surface2);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .12s;color:var(--text2);}
.menu-btn:hover{background:var(--surface3);color:var(--text);}
.topbar-title{font-family:var(--font-display);font-weight:700;font-size:15px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.view-tabs{display:flex;gap:2px;background:var(--surface2);padding:3px;border-radius:7px;border:1px solid var(--border);}
.view-tab{padding:4px 10px;border-radius:5px;cursor:pointer;font-size:11.5px;color:var(--text2);transition:all .12s;user-select:none;white-space:nowrap;}
.view-tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm);font-weight:500;}
.view-tab:hover:not(.active){color:var(--text);}
.search-bar{flex:1;max-width:190px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:6px 11px;font-size:12px;font-family:var(--font-body);outline:none;transition:border-color .12s,box-shadow .12s;}
.search-bar:focus{border-color:var(--accent);}
.topbar-icon{width:30px;height:30px;border:1px solid var(--border);background:var(--surface2);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all .12s;}
.topbar-icon:hover{background:var(--surface3);border-color:var(--border2);}

/* ===== BUTTONS ===== */
.btn{padding:7px 14px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;border:none;transition:all .12s;font-family:var(--font-body);white-space:nowrap;}
.btn-primary{background:linear-gradient(135deg,var(--grad-start),var(--grad-mid));color:white;}
.btn-primary:hover{opacity:.9;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);background:var(--surface2);}
.btn-danger{background:transparent;color:#ef5350;border:1px solid rgba(239,83,80,0.3);}
.btn-danger:hover{background:rgba(239,83,80,0.1);}
.btn-sm{padding:4px 10px;font-size:11.5px;}

/* ===== FILTER BAR ===== */
.filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:7px 16px;display:flex;gap:7px;align-items:center;flex-shrink:0;flex-wrap:wrap;}
.filter-label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);}
.filter-chip{padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:11.5px;cursor:pointer;transition:all .12s;font-family:var(--font-body);}
.filter-chip:hover{border-color:var(--border2);color:var(--text);}
.filter-chip.filtered{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}
.filter-select{background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--text2);padding:4px 11px;font-size:11.5px;font-family:var(--font-body);outline:none;cursor:pointer;transition:all .12s;}
.filter-select:focus,.filter-select:hover{border-color:var(--accent);color:var(--text);}

/* ===== CONTENT ===== */
.content{flex:1;overflow-y:auto;display:flex;flex-direction:column;}

/* ===== DASHBOARD ===== */
.dash-view{padding:22px;overflow-y:auto;height:100%;}
.dash-welcome{font-size:24px;font-weight:700;font-family:var(--font-display);margin-bottom:20px;color:var(--text);line-height:1.15;}
.dash-welcome .grad{background:linear-gradient(135deg,var(--grad-start),var(--grad-mid),var(--grad-end));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.kpi-grid{display:grid;grid-template-columns:repeat(6,minmax(112px,1fr));gap:12px;margin-bottom:20px;}
.kpi{position:relative;background:linear-gradient(180deg,color-mix(in srgb,var(--surface) 96%,white),var(--surface));border:1px solid var(--border);border-radius:12px;padding:16px 12px;text-align:left;transition:all .15s;overflow:hidden;box-shadow:var(--shadow-sm);}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--grad-start),var(--grad-mid));opacity:.95;}
.kpi:hover{border-color:var(--border2);transform:translateY(-2px);}
.kpi-num{font-size:25px;font-weight:800;font-family:var(--font-display);margin-bottom:5px;line-height:1.05;}
.kpi-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;font-weight:700;}
.dash-row{display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap;}
.dash-card{background:linear-gradient(180deg,color-mix(in srgb,var(--surface) 97%,white),var(--surface));border:1px solid var(--border);border-radius:12px;padding:16px;flex:1;min-width:220px;box-shadow:var(--shadow-sm);}
.dash-card-title{font-size:12.5px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.dash-task-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12.5px;}
.dash-task-row:last-child{border-bottom:none;}
.dash-task-name{flex:1;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.dash-task-name:hover{color:var(--accent);}
.dash-task-date{font-size:10px;color:var(--text3);white-space:nowrap;}
.dash-focus-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:16px;}
.dash-focus-card{background:linear-gradient(180deg,var(--surface2),var(--surface));border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .15s;min-height:94px;}
.dash-focus-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:var(--shadow-sm);}
.dash-focus-top{display:flex;align-items:center;gap:8px;color:var(--text2);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;}
.dash-focus-num{font-family:var(--font-display);font-size:28px;font-weight:800;line-height:1;color:var(--text);}
.dash-focus-copy{font-size:12px;color:var(--text3);margin-top:5px;line-height:1.35;}
.dash-mini-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;}
.dash-mini-item{display:flex;align-items:center;gap:9px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px;cursor:pointer;min-width:0;}
.dash-mini-item:hover{border-color:var(--accent);color:var(--accent);}
.dash-mini-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dash-mini-title{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dash-mini-meta{font-size:10.5px;color:var(--text3);white-space:nowrap;margin-left:auto;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.bar-lbl{font-size:11.5px;color:var(--text2);width:64px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dash-bar{flex:1;height:8px;background:var(--surface3);border-radius:999px;overflow:hidden;}
.dash-bar-fill{height:100%;border-radius:999px;transition:width .5s;}
.bar-val{font-size:10.5px;color:var(--text3);width:20px;text-align:right;}
.dash-chart{display:none;width:100%;height:180px!important;max-height:180px;}
#chart-progress{height:140px!important;max-height:140px;}
.chart-fallback{display:flex;flex-direction:column;gap:9px;padding-top:4px;}

/* ===== KANBAN ===== */
.kanban-board{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;padding:14px 16px;align-items:start;}
.kanban-col{min-width:0;background:var(--surface);border-radius:12px;border:1px solid var(--border);display:flex;flex-direction:column;max-height:calc(100vh - 134px);box-shadow:var(--shadow-sm);}
.kanban-col.drag-over{border-color:var(--accent);background:var(--accent-soft);}
.kanban-col-header{padding:11px 13px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border);flex-shrink:0;}
.col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.col-title{font-weight:600;font-size:12px;flex:1;color:var(--text);}
.col-count{font-size:10.5px;color:var(--text3);background:var(--surface2);padding:2px 6px;border-radius:8px;}
.kanban-col-body{padding:8px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:6px;min-height:50px;}
.add-task-col-btn{margin:4px 8px 8px;padding:6px 10px;border-radius:8px;border:1px dashed var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-size:12px;display:flex;align-items:center;gap:5px;transition:all .12s;font-family:var(--font-body);}
.add-task-col-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}

/* ===== TASK CARD ===== */
.task-card{background:linear-gradient(180deg,var(--surface2),color-mix(in srgb,var(--surface2) 86%,var(--surface)));border-radius:10px;padding:11px 12px;border:1px solid var(--border);cursor:pointer;transition:all .15s;user-select:none;}
.task-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:var(--shadow-sm);}
.task-card.dragging{opacity:.4;transform:rotate(2deg);}
.task-card-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;}
.task-status-mark{width:9px;height:9px;border-radius:50%;margin-top:5px;box-shadow:0 0 0 3px color-mix(in srgb,currentColor 18%,transparent);flex-shrink:0;}
.task-card-title{font-size:12.8px;font-weight:600;line-height:1.42;margin-bottom:8px;color:var(--text);}
.task-card-top .task-card-title{margin-bottom:0;flex:1;min-width:0;}
.task-card-desc{font-size:11.5px;line-height:1.45;color:var(--text3);margin:-2px 0 8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.task-card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.task-card-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:7px;}
.subtask-bar{margin-bottom:6px;}
.subtask-progress{height:3px;background:var(--surface3);border-radius:2px;overflow:hidden;margin-top:2px;}
.subtask-progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s;}

/* ===== BADGES ===== */
.tag-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;white-space:nowrap;}
.priority-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;}
.priority-urgent{background:rgba(244,63,94,0.16);color:var(--red);}
.priority-high{background:rgba(249,115,22,0.17);color:var(--accent2);}
.priority-normal{background:rgba(34,211,238,0.15);color:var(--accent);}
.priority-low{background:rgba(148,163,184,0.16);color:var(--text2);}
.due-badge{font-size:10.5px;color:var(--text3);display:flex;align-items:center;gap:2px;}
.due-badge.overdue{color:#ef5350;}
.comment-count{font-size:10.5px;color:var(--text3);margin-left:auto;}

/* ===== LIST ===== */
.list-view{padding:0 16px 24px;overflow-y:auto;height:100%;}
.list-header-row{display:grid;grid-template-columns:18px 1fr 120px 110px 80px 38px;gap:10px;padding:8px 10px;margin-bottom:2px;}
.list-header-cell{font-size:9.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
.list-group{margin-bottom:18px;}
.list-group-header{display:flex;align-items:center;gap:8px;padding:8px 2px 6px;border-bottom:2px solid var(--border);margin-bottom:4px;}
.list-group-title{font-weight:700;font-size:12.5px;font-family:var(--font-display);}
.list-group-count{font-size:11px;color:var(--text3);}
.list-row{display:grid;grid-template-columns:18px 1fr 120px 110px 80px 38px;align-items:center;gap:10px;padding:8px 11px;border-radius:9px;cursor:pointer;transition:background .1s,border-color .1s;border-bottom:1px solid var(--border);}
.list-row:hover{background:var(--surface2);border-color:var(--border2);}
.list-row:last-child{border-bottom:none;}
.list-row-check{width:15px;height:15px;border:2px solid var(--border2);border-radius:4px;cursor:pointer;flex-shrink:0;transition:all .12s;display:flex;align-items:center;justify-content:center;font-size:9px;color:white;}
.list-row-check.done{background:var(--green);border-color:var(--green);}
.list-row-title{font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.list-row-title.done-text{text-decoration:line-through;color:var(--text3);}
.list-row-due{font-size:11.5px;color:var(--text2);}
.list-row-due.overdue{color:#ef5350;}
.icon-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:3px 5px;border-radius:4px;transition:all .12s;font-size:12.5px;}
.icon-btn:hover{background:var(--surface3);color:var(--text);}

/* ===== CALENDAR ===== */
.calendar-view{padding:14px 16px;overflow-y:auto;height:100%;}
.cal-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.cal-month{font-family:var(--font-display);font-size:18px;font-weight:700;flex:1;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.cal-day-name{background:var(--surface);padding:8px;text-align:center;font-size:9.5px;font-weight:700;text-transform:uppercase;color:var(--text3);letter-spacing:.8px;}
.cal-day{background:var(--surface);min-height:78px;padding:6px;cursor:pointer;transition:background .1s;}
.cal-day:hover{background:var(--surface2);}
.cal-day.today{background:var(--accent-soft);}
.cal-day.other-month .cal-day-num{color:var(--text3);}
.cal-day-num{font-size:11px;font-weight:600;margin-bottom:3px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.cal-day.today .cal-day-num{background:var(--accent);color:white;}
.cal-task-chip{font-size:9.5px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.cal-task-chip.priority-urgent{background:rgba(229,57,53,0.18);color:#ef9a9a;}
.cal-task-chip.priority-high{background:rgba(251,140,0,0.18);color:#ffcc80;}
.cal-task-chip.priority-normal{background:rgba(124,92,191,0.2);color:#ce93d8;}
.cal-task-chip.priority-low{background:rgba(120,120,120,0.12);color:#888;}

/* ===== PROJECTS ===== */
.projects-view{padding:14px 16px;overflow-y:auto;height:100%;}
.projects-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.projects-heading{font-family:var(--font-display);font-size:17px;font-weight:700;}
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;}
.project-card{background:linear-gradient(180deg,color-mix(in srgb,var(--surface) 97%,white),var(--surface));border-radius:12px;padding:16px;border:1px solid var(--border);cursor:pointer;transition:all .18s;box-shadow:var(--shadow-sm);}
.project-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow);}
.project-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.project-card-left{display:flex;align-items:center;gap:8px;}
.project-card-dot{width:12px;height:12px;border-radius:4px;flex-shrink:0;}
.project-card-name{font-family:var(--font-display);font-weight:700;font-size:14px;}
.project-card-actions{display:flex;gap:3px;opacity:0;transition:opacity .12s;}
.project-card:hover .project-card-actions{opacity:1;}
.proj-act-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:2px 4px;border-radius:4px;transition:all .12s;}
.proj-act-btn:hover{background:var(--surface2);color:var(--text);}
.proj-act-btn.del:hover{color:#ef5350;background:rgba(239,83,80,0.1);}
.project-card-sub{font-size:11px;color:var(--text3);margin-bottom:10px;}
.project-card-stats{display:flex;gap:12px;margin-bottom:10px;}
.proj-stat{text-align:center;}
.proj-stat-num{font-size:19px;font-weight:700;font-family:var(--font-display);}
.proj-stat-label{font-size:9.5px;color:var(--text3);}
.progress-bar{height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;transition:width .5s;}
.progress-label{font-size:9.5px;color:var(--text3);margin-bottom:3px;display:flex;justify-content:space-between;}
.new-project-card{background:var(--surface);border-radius:10px;padding:15px;border:2px dashed var(--border2);cursor:pointer;transition:all .18s;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:145px;gap:6px;color:var(--text3);}
.new-project-card:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}

/* ===== SETTINGS ===== */
.settings-view{padding:18px 22px;overflow-y:auto;height:100%;max-width:920px;width:100%;}
.settings-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;}
.settings-card{background:linear-gradient(180deg,color-mix(in srgb,var(--surface) 97%,white),var(--surface));border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow-sm);}
.settings-title{font-family:var(--font-display);font-size:16px;font-weight:700;margin-bottom:4px;}
.settings-sub{font-size:12px;color:var(--text3);line-height:1.45;margin-bottom:14px;}
.segmented{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:3px;gap:3px;}
.segmented button{flex:1;border:none;background:transparent;color:var(--text2);font-family:var(--font-body);font-weight:700;font-size:12px;border-radius:7px;padding:8px;cursor:pointer;}
.segmented button.active{background:var(--surface);color:var(--accent);box-shadow:var(--shadow-sm);}
.setting-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-top:1px solid var(--border);}
.setting-row:first-of-type{border-top:none;padding-top:0;}
.setting-label{font-size:12.5px;font-weight:700;color:var(--text);}
.setting-help{font-size:11px;color:var(--text3);margin-top:2px;}
body[data-density="compact"] .kpi{padding:12px 10px;}
body[data-density="compact"] .dash-view,body[data-density="compact"] .settings-view{padding:14px;}
body[data-density="compact"] .task-card{padding:9px 10px;}
body[data-density="compact"] .dash-card{padding:13px;}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .12s ease;backdrop-filter:blur(3px);}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:12px;width:100%;max-width:520px;border:1px solid var(--border2);animation:slideUp .18s ease;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow);}
@keyframes slideUp{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{padding:15px 17px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:var(--font-display);font-weight:700;font-size:15px;}
.modal-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:17px;padding:3px 5px;border-radius:5px;line-height:1;transition:all .12s;}
.modal-close:hover{background:var(--surface2);color:var(--text);}
.modal-body{padding:15px 17px;display:flex;flex-direction:column;gap:12px;}
.modal-footer{padding:12px 17px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
.modal-task{max-width:680px;}
.task-detail-title{background:none;border:none;color:var(--text);font-size:17px;font-weight:700;font-family:var(--font-display);width:100%;outline:none;padding:2px 0;border-bottom:2px solid transparent;transition:border-color .15s;}
.task-detail-title:focus{border-color:var(--accent);}
.task-meta-row{display:flex;flex-wrap:wrap;gap:12px;}
.task-meta-item{display:flex;flex-direction:column;gap:4px;}
.task-meta-label{font-size:9.5px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.task-description{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 12px;font-size:12.5px;font-family:var(--font-body);min-height:76px;resize:vertical;outline:none;width:100%;transition:border-color .12s;}
.task-description:focus{border-color:var(--accent);}

/* SUBTASKS */
.subtask-item{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);}
.subtask-check{width:14px;height:14px;border:2px solid var(--border2);border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:white;transition:all .12s;flex-shrink:0;}
.subtask-check.done{background:var(--green);border-color:var(--green);}
.subtask-text{flex:1;font-size:12px;color:var(--text);}
.subtask-text.done-text{text-decoration:line-through;color:var(--text3);}
.subtask-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;padding:2px;opacity:0;transition:all .12s;}
.subtask-item:hover .subtask-del{opacity:1;}
.subtask-del:hover{color:#ef5350;}
.add-subtask-row{display:flex;align-items:center;gap:8px;padding:5px 0;}
.add-subtask-input{flex:1;background:none;border:none;border-bottom:1px dashed var(--border2);color:var(--text);font-size:12px;font-family:var(--font-body);outline:none;padding:2px 0;}
.add-subtask-input:focus{border-color:var(--accent);}

/* TAGS */
.tags-editor{display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
.tag-pill{display:flex;align-items:center;gap:3px;padding:3px 8px;border-radius:10px;font-size:10.5px;font-weight:600;}
.tag-pill .tag-x{background:none;border:none;cursor:pointer;color:inherit;opacity:.7;font-size:10px;padding:0 0 0 2px;line-height:1;}
.tag-pill .tag-x:hover{opacity:1;}
.tag-add-btn{font-size:10.5px;color:var(--text3);background:var(--surface2);border:1px dashed var(--border2);border-radius:10px;padding:2px 8px;cursor:pointer;transition:all .12s;}
.tag-add-btn:hover{border-color:var(--accent);color:var(--accent);}

/* COMMENTS */
.comments-title{font-size:11.5px;font-weight:600;color:var(--text2);margin-bottom:8px;}
.comment-item{display:flex;gap:7px;margin-bottom:8px;}
.comment-avatar{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--grad-start),var(--grad-mid));display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:white;flex-shrink:0;}
.comment-bubble{flex:1;}
.comment-meta{font-size:9.5px;color:var(--text3);margin-bottom:3px;}
.comment-text{font-size:12px;background:var(--surface2);padding:6px 10px;border-radius:7px;line-height:1.5;}
.comment-input-row{display:flex;gap:7px;align-items:flex-end;margin-top:8px;}
.comment-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 10px;font-size:12px;font-family:var(--font-body);outline:none;resize:none;min-height:32px;transition:border-color .12s;}
.comment-input:focus{border-color:var(--accent);}

/* FORM */
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-label{font-size:10.5px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}
.form-input,.form-textarea,.form-select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 11px;font-size:12.5px;font-family:var(--font-body);transition:border-color .12s,box-shadow .12s;outline:none;width:100%;}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--accent);}
.form-textarea{min-height:68px;resize:vertical;}
.form-select{cursor:pointer;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.color-picker{display:flex;gap:6px;flex-wrap:wrap;}
.color-dot-pick{width:21px;height:21px;border-radius:50%;cursor:pointer;transition:all .12s;border:3px solid transparent;outline:2px solid transparent;}
.color-dot-pick:hover{transform:scale(1.15);}
.color-dot-pick.selected{outline:2px solid var(--text);outline-offset:2px;transform:scale(1.1);}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:var(--text3);}

/* SKELETON LOADER */
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skeleton{background:linear-gradient(90deg,var(--surface2) 0%,var(--surface3) 50%,var(--surface2) 100%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius-sm);}
.skeleton-text{height:12px;margin-bottom:6px;}
.skeleton-title{height:18px;margin-bottom:10px;}
.skeleton-card{padding:14px;border-radius:10px;}
.skeleton-kpi{height:60px;border-radius:10px;}
.skeleton-bar{height:6px;border-radius:3px;margin-bottom:7px;}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideInLeft{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideInRight{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes scaleIn{from{transform:scale(0.9);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes checkBounce{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes confettiPop{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-30px) scale(0);opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

.animate-fade-in{animation:fadeIn .2s ease;}
.animate-slide-up{animation:slideUp .25s ease;}
.animate-slide-in-left{animation:slideInLeft .25s ease;}
.animate-slide-in-right{animation:slideInRight .25s ease;}
.animate-scale-in{animation:scaleIn .2s ease;}
.animate-check{animation:checkBounce .3s ease;}

.task-card{animation:fadeIn .2s ease;}
.kpi{animation:scaleIn .3s ease;}
.dash-card{animation:fadeIn .3s ease;}
.list-row{animation:slideInLeft .15s ease;}
.modal{animation:scaleIn .2s ease;}

/* Confetti effect */
.confetti{position:fixed;width:8px;height:8px;border-radius:50%;pointer-events:none;z-index:9999;animation:confettiPop .6s ease forwards;}

/* TOAST */
.toast{position:fixed;bottom:18px;right:18px;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:9px 13px;font-size:12.5px;z-index:9999;animation:slideUp .18s ease;display:flex;align-items:center;gap:7px;box-shadow:var(--shadow);}
.toast.success{border-left:3px solid var(--green);}
.toast.error{border-left:3px solid var(--red);}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:130px;color:var(--text3);gap:5px;}

/* MOBILE */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;}
.sidebar-overlay.active{display:block;}
@media(max-width:700px){
  .nav-sidebar{position:fixed;left:0;top:0;height:100vh;transform:translateX(-100%);transition:transform .25s;width:280px;z-index:200;}
  .nav-sidebar.mobile-open{transform:translateX(0);box-shadow:var(--shadow);}
  .view-tabs{display:none;}
  .search-bar{display:none;}
  .topbar{padding:0 12px;gap:8px;height:52px;}
  .topbar-title{font-size:14px;}
  #topbar-clock{display:none;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
  .kpi{padding:14px 11px;border-radius:11px;}
  .kpi-num{font-size:23px;}
  .kanban-board{padding:10px 12px;gap:10px;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));}
  .kanban-col{max-height:calc(100vh - 164px);}
  .dash-row{flex-direction:column;}
  .dash-card{min-width:unset;}
  .dash-focus-grid{grid-template-columns:1fr;gap:10px;}
  .dash-mini-list{grid-template-columns:1fr;}
  .dash-welcome{font-size:21px;margin-bottom:14px;}
  .projects-grid{grid-template-columns:1fr 1fr;}
  .list-header-row{display:none;}
  .list-row{grid-template-columns:20px 1fr 70px 38px;gap:8px;}
  .list-row>div:nth-child(3){display:none;}
  .list-row>div:nth-child(5){display:none;}
  .filter-bar{padding:6px 12px;gap:6px;overflow-x:auto;flex-wrap:nowrap;}
  .modal{border-radius:16px 16px 0 0;max-width:100%;position:fixed;bottom:0;left:0;right:0;max-height:90vh;}
  .modal-task{max-width:100%;}
  .task-meta-row{gap:8px;}
  .form-row{grid-template-columns:1fr;}
  .dash-view{padding:12px;}
  .settings-view{padding:12px 12px 82px;}
  .settings-grid{grid-template-columns:1fr;}
  .projects-view{padding:12px;}
  .calendar-view{padding:12px;}
  .list-view{padding:0 12px 80px;}
}
/* Mobile bottom nav bar */
.mobile-nav{display:none;}
@media(max-width:700px){
  .mobile-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    background:var(--surface);border-top:1px solid var(--border);
    height:62px;z-index:90;padding-bottom:env(safe-area-inset-bottom);
  }
  .mobile-nav-item{
    flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:2px;cursor:pointer;
    font-size:18px;color:var(--text3);transition:all .12s;
    border:none;background:none;
  }
  .mobile-nav-item .ui-icon{width:20px;height:20px;}
  .mobile-nav-item.active{color:var(--accent);}
  .mobile-nav-item span:last-child{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.45px;}
  .main{padding-bottom:62px;}
  .modal-overlay{align-items:flex-end;padding:0;}
}
</style>
</head>

function localDateStr(offsetDays=0){
  const d=new Date();
  if(offsetDays)d.setDate(d.getDate()+offsetDays);
  return d.toLocaleDateString('sv',{timeZone:'America/Argentina/Buenos_Aires'});
}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function getHour(){const n=new Date();const h=n.getHours();return h<12?'Buenos días':h<20?'Buenas tardes':'Buenas noches';}
function filterTasks(tasks){
  let t=tasks;
  if(state.filterProject)t=t.filter(x=>x.projectId===state.filterProject);
  const q=getSearch();if(q)t=t.filter(x=>x.title.toLowerCase().includes(q)||(x.description||'').toLowerCase().includes(q));
  const fp=document.getElementById('filter-priority')?.value;
  const fs=document.getElementById('filter-status')?.value;
  const fd=document.getElementById('filter-due')?.value;
  if(fp)t=t.filter(x=>x.priority===fp);
  if(fs)t=t.filter(x=>x.status===fs);
  if(fd){
    const today=localDateStr(0);
    const tomorrow=localDateStr(1);
    const weekEnd=localDateStr(7);
    if(fd==='overdue')t=t.filter(x=>x.dueDate&&x.dueDate<today&&x.status!=='completado');
    else if(fd==='today')t=t.filter(x=>x.dueDate===today);
    else if(fd==='tomorrow')t=t.filter(x=>x.dueDate===tomorrow);
    else if(fd==='week')t=t.filter(x=>x.dueDate&&x.dueDate>=today&&x.dueDate<=weekEnd);
    else if(fd==='nodate')t=t.filter(x=>!x.dueDate);
  }
  return t;
}

        ${important.length?`<div class="dash-mini-list">${important.map(t=>{const p=getProject(t.projectId);const c=t.priority==='urgent'?'var(--red)':t.dueDate&&t.dueDate<today?'var(--red)':p?.color||'var(--accent)';return`<div class="dash-mini-item" onclick="openTaskDetail('${t.id}')"><span class="dash-mini-dot" style="background:${c}"></span><span class="dash-mini-title">${esc(t.title)}</span><span class="dash-mini-meta">${t.dueDate?formatDate(t.dueDate,t.dueTime):PRIORITY_LABELS[t.priority]}</span></div>`;}).join('')}</div>`:`<div style="font-size:12px;color:var(--text3);padding:8px 0">Sin urgencias por ahora.</div>`}
      </div>
      <div class="dash-card">
        <div class="dash-card-title">${uiIcon('check')} Completadas recientes</div>
        ${done.length?done.slice(-5).reverse().map(t=>{const p=getProject(t.projectId);return`<div class="dash-task-row">${uiIcon('check')}<span class="dash-task-name" onclick="openTaskDetail('${t.id}')">${esc(t.title)}</span>${p?`<span class="tag-badge" style="background:${p.color}20;color:${p.color}">${esc(p.name)}</span>`:''}</div>`;}).join(''):`<div style="font-size:12px;color:var(--text3);padding:8px 0">Sin tareas completadas aún.</div>`}
      </div>
    </div>
  </div>`;
  setTimeout(()=>initDashboardCharts(byP,bySpace,all,done),50);
  return html;
}

function initDashboardCharts(byP,bySpace,all,done){
  if(typeof Chart==='undefined')return;
  const ctxPri=document.getElementById('chart-priority');
  const ctxSpa=document.getElementById('chart-space');
  const ctxPro=document.getElementById('chart-progress');
  if(!ctxPri||!ctxSpa||!ctxPro)return;
  const showChart=(canvasId,fallbackId)=>{const c=document.getElementById(canvasId),f=document.getElementById(fallbackId);if(c)c.style.display='block';if(f)f.style.display='none';};

  const colors={urgent:'#f43f5e',high:'#f97316',normal:'#22d3ee',low:'#94a3b8'};

  // Destroy old charts
  if(chartPriority)chartPriority.destroy();
  if(chartSpace)chartSpace.destroy();
  if(chartProgress)chartProgress.destroy();

  // Chart Prioridad
  if(byP.urgent+byP.high+byP.normal+byP.low>0){
    showChart('chart-priority','priority-fallback');
    chartPriority=new Chart(ctxPri,{type:'doughnut',data:{labels:['Urgente','Alta','Normal','Baja'],datasets:[{data:[byP.urgent,byP.high,byP.normal,byP.low],backgroundColor:[colors.urgent,colors.high,colors.normal,colors.low],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false}},animation:{animateScale:true,animateRotate:true}}});
  }

  // Chart Espacios
  if(bySpace.length){
    showChart('chart-space','space-fallback');
    chartSpace=new Chart(ctxSpa,{type:'bar',data:{labels:bySpace.map(s=>s.name.length>12?s.name.slice(0,12)+'...':s.name),datasets:[{label:'Tareas',data:bySpace.map(s=>s.count),backgroundColor:bySpace.map(s=>s.color),borderRadius:6,barThickness:28}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false,beginAtZero:true}},animation:{delay:100}}});
  }

  // Chart Progreso semanal
  const days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const today=new Date();
  const weekData=[];
  for(let i=6;i>=0;i--){
    const d=new Date(today);
    d.setDate(d.getDate()-i);
    const dayTasks=all.filter(t=>{
      const td=t.createdAt?new Date(t.createdAt):null;
      return td&&td.toDateString()===d.toDateString();
    });
    const doneTasks=dayTasks.filter(t=>t.status==='completado').length;
    weekData.push({day:days[d.getDay()],done:doneTasks,total:dayTasks.length});
  }
  showChart('chart-progress','progress-fallback');
  chartProgress=new Chart(ctxPro,{type:'bar',data:{labels:weekData.map(d=>d.day),datasets:[{label:'Completadas',data:weekData.map(d=>d.done),backgroundColor:'#22c55e',borderRadius:4,barThickness:20}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{display:true,grid:{display:false},ticks:{color:'#72839a',font:{size:10}}},y:{display:true,beginAtZero:true,grid:{color:'#23334f'},ticks:{color:'#72839a',font:{size:10}}}},animation:{delay:200}}});
}

/* KANBAN */
function renderKanban(){const tasks=filterTasks(state.tasks);return`<div class="kanban-board">${STATUSES.map(status=>{const col=tasks.filter(t=>t.status===status);const isArchived=status==='completado'||status==='cancelado';return`<div class="kanban-col" data-status="${status}" ondragover="dragOver(event)" ondrop="drop(event,this)" style="${isArchived?'opacity:0.75;':''}"><div class="kanban-col-header" style="${isArchived?'border-bottom:2px solid '+STATUS_COLORS[status]+';':''}"><div class="col-dot" style="background:${STATUS_COLORS[status]}"></div><div class="col-title" style="${isArchived?'color:'+STATUS_COLORS[status]+';':''}">${STATUS_LABELS[status]}</div><div class="col-count">${col.length}</div></div><div class="kanban-col-body">${col.map(t=>renderTaskCard(t)).join('')}${col.length===0?'<div class="empty-state"><div style="font-size:22px;opacity:.3">--</div></div>':''}</div><button class="add-task-col-btn" onclick="openTaskModal(\'${status}\')">${uiIcon('plus')} Agregar tarea</button></div>`;}).join('')}</div>`;}

function renderTaskCard(t){const proj=getProject(t.projectId);const overdue=isOverdue(t.dueDate)&&t.status!=='completado';const sub=t.subtasks||[];const doneSub=sub.filter(s=>s.done).length;const pct=sub.length?Math.round(doneSub/sub.length*100):0;const tags=t.tags||[];const desc=(t.description||'').trim();return`<div class="task-card" draggable="true" data-id="${t.id}" ondragstart="dragStart(event,this)" ondragend="dragEnd(this)" onclick="openTaskDetail('${t.id}')"><div class="task-card-top"><span class="task-status-mark" style="color:${STATUS_COLORS[t.status]||'var(--accent)'};background:${STATUS_COLORS[t.status]||'var(--accent)'}"></span><div class="task-card-title">${esc(t.title)}</div></div>${desc?`<div class="task-card-desc">${esc(desc)}</div>`:''}${tags.length?`<div class="task-card-tags">${renderTags(tags)}</div>`:''}${sub.length?`<div class="subtask-bar"><div style="font-size:9.5px;color:var(--text3);display:flex;justify-content:space-between"><span>${doneSub}/${sub.length} subtareas</span><span>${pct}%</span></div><div class="subtask-progress"><div class="subtask-progress-fill" style="width:${pct}%"></div></div></div>`:''}<div class="task-card-meta"><span class="priority-badge priority-${t.priority}">${PRIORITY_LABELS[t.priority]}</span>${t.dueDate?`<span class="due-badge ${overdue?'overdue':''}">${uiIcon('calendar')} ${formatDate(t.dueDate,t.dueTime)}</span>`:''}${proj?`<span class="tag-badge" style="background:${proj.color}20;color:${proj.color}">${esc(proj.name)}</span>`:''}${t.comments.length?`<span class="comment-count" style="margin-left:auto">${uiIcon('comment')} ${t.comments.length}</span>`:''}</div></div>`;}

function dragStart(e,el){dragId=el.dataset.id;el.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function dragEnd(el){el.classList.remove('dragging');document.querySelectorAll('.kanban-col').forEach(c=>c.classList.remove('drag-over'));}
function dragOver(e){e.preventDefault();e.currentTarget.closest('.kanban-col')?.classList.add('drag-over');}
async function drop(e,colEl){e.preventDefault();colEl.classList.remove('drag-over');const status=colEl.dataset.status;if(!dragId||!status)return;const task=state.tasks.find(t=>t.id===dragId);if(task&&task.status!==status){task.status=status;await saveTask(task);renderContent();showToast(`Movida a ${STATUS_LABELS[status]}`,'success');}dragId=null;}

/* LIST */
function renderListRow(t){const proj=getProject(t.projectId);const done=t.status==='completado';const cancelled=t.status==='cancelado';const overdue=isOverdue(t.dueDate)&&!done&&!cancelled;return`<div class="list-row" onclick="openTaskDetail('${t.id}')" style="${cancelled?'opacity:0.6;':done?'opacity:0.5;':''}"><div class="list-row-check ${done?'done':''}" onclick="event.stopPropagation();toggleDone('${t.id}',event)">${done?uiIcon('check'):cancelled?'x':''}</div><div class="list-row-title ${done||cancelled?'done-text':''}">${esc(t.title)}</div><div>${proj?`<span style="background:${proj.color}20;color:${proj.color};padding:2px 7px;border-radius:4px;font-size:10.5px">${esc(proj.name)}</span>`:'-'}</div><div class="list-row-due ${overdue?'overdue':''}">${t.dueDate?formatDate(t.dueDate,t.dueTime):'-'}</div><div><span class="priority-badge priority-${t.priority}">${PRIORITY_LABELS[t.priority]}</span></div><div style="text-align:right"><button class="icon-btn" onclick="event.stopPropagation();deleteTask('${t.id}')" title="Eliminar">${uiIcon('trash')}</button></div></div>`;}
function toggleCompletedSection(){completedSectionOpen=!completedSectionOpen;renderContent();}
function renderList(){
  const tasks=filterTasks(state.tasks);
  const activeStatuses=['pendiente','en progreso','revisión','cancelado'];
  const grouped={};activeStatuses.forEach(s=>grouped[s]=[]);
  const completedTasks=[];
  tasks.forEach(t=>{if(t.status==='completado')completedTasks.push(t);else if(grouped[t.status])grouped[t.status].push(t);});
  const activeGroupsHtml=activeStatuses.map(status=>{const col=grouped[status];return`<div class="list-group"><div class="list-group-header"><div class="col-dot" style="background:${STATUS_COLORS[status]};width:7px;height:7px;border-radius:50%;flex-shrink:0"></div><div class="list-group-title" style="${status==='cancelado'?'color:'+STATUS_COLORS['cancelado']:''}">${status==='cancelado'?'🚫 ':''}${STATUS_LABELS[status]}</div><div class="list-group-count">${col.length}</div></div>${col.map(t=>renderListRow(t)).join('')}${col.length===0?`<div style="padding:7px 10px;font-size:12px;color:var(--text3)">Sin tareas</div>`:''}</div>`;}).join('');
  const completedHtml=`<div class="list-group" style="margin-top:8px;border-top:2px dashed var(--border2);padding-top:10px"><div class="list-group-header" onclick="toggleCompletedSection()" style="cursor:pointer;user-select:none;background:var(--surface2);border-radius:7px;padding:8px 10px;margin-bottom:6px"><div class="col-dot" style="background:${STATUS_COLORS['completado']};width:7px;height:7px;border-radius:50%;flex-shrink:0"></div><div class="list-group-title" style="color:var(--green)">📦 Completadas</div><div class="list-group-count">${completedTasks.length}</div><span style="margin-left:auto;color:var(--text3);font-size:11px">${completedSectionOpen?'▲ Ocultar':'▼ Ver todas'}</span></div>${completedSectionOpen?completedTasks.map(t=>renderListRow(t)).join('')+(completedTasks.length===0?'<div style="padding:7px 10px;font-size:12px;color:var(--text3)">Sin tareas completadas</div>':''):''}</div>`;
  return`<div class="list-view"><div class="list-header-row"><div></div><div class="list-header-cell">Tarea</div><div class="list-header-cell">Espacio</div><div class="list-header-cell">Fecha</div><div class="list-header-cell">Prioridad</div><div></div></div>${activeGroupsHtml}${completedHtml}</div>`;
}

/* CALENDAR */
function renderCalendar(){const d=state.calendarDate;const year=d.getFullYear(),month=d.getMonth();const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];const DAYS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];const today=new Date();today.setHours(0,0,0,0);const firstDay=new Date(year,month,1).getDay();const daysInMonth=new Date(year,month+1,0).getDate();const daysInPrev=new Date(year,month,0).getDate();const byDate={};filterTasks(state.tasks).forEach(t=>{if(t.dueDate){byDate[t.dueDate]=byDate[t.dueDate]||[];byDate[t.dueDate].push(t);}});let cells='';for(let i=firstDay-1;i>=0;i--)cells+=`<div class="cal-day other-month"><div class="cal-day-num">${daysInPrev-i}</div></div>`;for(let day=1;day<=daysInMonth;day++){const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;const isToday=new Date(year,month,day).getTime()===today.getTime();const dt=byDate[ds]||[];cells+=`<div class="cal-day ${isToday?'today':''}" onclick="openTaskModal(null,'${ds}')"><div class="cal-day-num">${day}</div>${dt.slice(0,3).map(t=>`<div class="cal-task-chip priority-${t.priority}" onclick="event.stopPropagation();openTaskDetail('${t.id}')">${esc(t.title)}</div>`).join('')}${dt.length>3?`<div style="font-size:9px;color:var(--text3)">+${dt.length-3}</div>`:''}</div>`;}const total=Math.ceil((firstDay+daysInMonth)/7)*7;for(let i=1;i<=total-firstDay-daysInMonth;i++)cells+=`<div class="cal-day other-month"><div class="cal-day-num">${i}</div></div>`;return`<div class="calendar-view"><div class="cal-header"><button class="btn btn-ghost btn-sm" id="cal-prev">‹</button><div class="cal-month">${MONTHS[month]} ${year}</div><button class="btn btn-ghost btn-sm" id="cal-next">›</button></div><div class="cal-grid">${DAYS.map(n=>`<div class="cal-day-name">${n}</div>`).join('')}${cells}</div></div>`;}
function bindCalendar(){document.getElementById('cal-prev').onclick=()=>{const d=state.calendarDate;state.calendarDate=new Date(d.getFullYear(),d.getMonth()-1,1);renderContent();};document.getElementById('cal-next').onclick=()=>{const d=state.calendarDate;state.calendarDate=new Date(d.getFullYear(),d.getMonth()+1,1);renderContent();};}

[],subtasks:[],tags:[],createdAt:new Date().toISOString()};state.tasks.push(newTask);await saveTask(newTask);closeModal();render();showToast('✓ Tarea creada','success');},'Crear tarea');}

/* TASK DETAIL */
function openTaskDetail(taskId){const task=state.tasks.find(t=>t.id===taskId);if(!task)return;const tags=task.tags||[];const subs=task.subtasks||[];document.getElementById('modal-container').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this){saveTaskDetail('${taskId}');closeModal()}"><div class="modal modal-task"><div class="modal-header"><input class="task-detail-title" id="dt-title" value="${esc(task.title)}" placeholder="Título"><button class="modal-close" onclick="saveTaskDetail('${taskId}');closeModal()">✕</button></div><div class="modal-body"><div class="task-meta-row"><div class="task-meta-item"><span class="task-meta-label">Estado</span><select class="form-select" style="padding:5px 8px;font-size:11.5px" id="dt-status">${STATUSES.map(s=>`<option value="${s}" ${task.status===s?'selected':''}>${STATUS_LABELS[s]}</option>`).join('')}</select></div><div class="task-meta-item"><span class="task-meta-label">Prioridad</span><select class="form-select" style="padding:5px 8px;font-size:11.5px" id="dt-priority">${PRIORITIES.map(p=>`<option value="${p}" ${task.priority===p?'selected':''}>${PRIORITY_LABELS[p]}</option>`).join('')}</select></div><div class="task-meta-item"><span class="task-meta-label">Espacio</span><select class="form-select" style="padding:5px 8px;font-size:11.5px" id="dt-project">${state.projects.map(p=>`<option value="${p.id}" ${task.projectId===p.id?'selected':''}>${esc(p.name)}</option>`).join('')}</select></div><div class="task-meta-item"><span class="task-meta-label">Fecha</span><input type="date" class="form-input" style="padding:5px 8px;font-size:11.5px;width:auto" id="dt-due" value="${task.dueDate||''}"></div><div class="task-meta-item"><span class="task-meta-label">Hora</span><input type="time" class="form-input" style="padding:5px 8px;font-size:11.5px;width:auto" id="dt-time" value="${task.dueTime||''}"></div></div><div class="form-group"><label class="form-label">Etiquetas</label><div class="tags-editor" id="tags-editor">${tags.map((tg,i)=>`<span class="tag-pill" style="background:${tg.color}22;color:${tg.color}">${esc(tg.name)}<button class="tag-x" onclick="removeTag('${taskId}',${i})">×</button></span>`).join('')}<button class="tag-add-btn" onclick="addTagPrompt('${taskId}')">+ Etiqueta</button></div></div><div class="form-group"><label class="form-label">Descripción</label><textarea class="task-description" id="dt-desc">${esc(task.description||'')}</textarea></div><div><div class="form-label" style="margin-bottom:7px">Subtareas</div><div id="subtasks-list">${renderSubtasksList(subs,taskId)}</div><div class="add-subtask-row"><span style="font-size:12px;color:var(--text3)">+</span><input class="add-subtask-input" id="new-subtask" placeholder="Agregar subtarea..."><button class="btn btn-ghost btn-sm" onclick="addSubtask('${taskId}')">Agregar</button></div></div><div><div class="comments-title">💬 Comentarios <span style="color:var(--text3)" id="comment-count">(${task.comments.length})</span></div><div id="comments-list">${renderComments(task.comments)}</div><div class="comment-input-row"><textarea class="comment-input" id="new-comment" placeholder="Escribí un comentario..." rows="1"></textarea><button class="btn btn-primary btn-sm" onclick="addComment('${taskId}')">Enviar</button></div></div></div><div class="modal-footer"><button class="btn btn-danger btn-sm" onclick="deleteTask('${taskId}');closeModal()">🗑 Eliminar</button><button class="btn btn-ghost btn-sm" onclick="saveTaskDetail('${taskId}');closeModal()">Guardar y cerrar</button></div></div></div>`;
setTimeout(()=>{document.getElementById('new-subtask')?.addEventListener('keydown',e=>{if(e.key==='Enter')addSubtask(taskId);});},50);}

function renderSubtasksList(subs,taskId){if(!subs.length)return`<div style="font-size:11.5px;color:var(--text3);padding:4px 0">Sin subtareas aún.</div>`;return subs.map((s,i)=>`<div class="subtask-item"><div class="subtask-check ${s.done?'done':''}" onclick="toggleSubtask('${taskId}',${i})">${s.done?'✓':''}</div><span class="subtask-text ${s.done?'done-text':''}">${esc(s.text)}</span><button class="subtask-del" onclick="removeSubtask('${taskId}',${i})">✕</button></div>`).join('');}
async function addSubtask(taskId){const input=document.getElementById('new-subtask');const text=input.value.trim();if(!text)return;const task=state.tasks.find(t=>t.id===taskId);if(!task)return;if(!task.subtasks)task.subtasks=[];task.subtasks.push({text,done:false});await saveTask(task);input.value='';document.getElementById('subtasks-list').innerHTML=renderSubtasksList(task.subtasks,taskId);}
async function toggleSubtask(taskId,idx){const task=state.tasks.find(t=>t.id===taskId);if(!task)return;task.subtasks[idx].done=!task.subtasks[idx].done;await saveTask(task);document.getElementById('subtasks-list').innerHTML=renderSubtasksList(task.subtasks,taskId);}
async function removeSubtask(taskId,idx){const task=state.tasks.find(t=>t.id===taskId);if(!task)return;task.subtasks.splice(idx,1);await saveTask(task);document.getElementById('subtasks-list').innerHTML=renderSubtasksList(task.subtasks,taskId);}

function addTagPrompt(taskId){const task=state.tasks.find(t=>t.id===taskId);if(!task)return;if(!task.tags)task.tags=[];const tm=document.createElement('div');tm.id='tag-modal';tm.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1100;display:flex;align-items:center;justify-content:center;padding:16px;';tm.innerHTML=`<div style="background:var(--surface);border-radius:10px;padding:16px;width:100%;max-width:280px;border:1px solid var(--border2)"><div style="font-family:Space Grotesk,sans-serif;font-weight:700;font-size:14px;margin-bottom:11px">Nueva etiqueta</div><div class="form-group" style="margin-bottom:9px"><label class="form-label">Nombre</label><input class="form-input" id="tag-name-input" placeholder="Ej: Urgente, Cliente..." autofocus></div><div class="form-group" style="margin-bottom:12px"><label class="form-label">Color</label><div class="color-picker">${TAG_COLORS.map((c,i)=>`<div class="color-dot-pick ${i===0?'selected':''}" style="background:${c}" onclick="selectColor(this)"></div>`).join('')}</div></div><div style="display:flex;justify-content:flex-end;gap:8px"><button class="btn btn-ghost btn-sm" onclick="document.getElementById('tag-modal').remove()">Cancelar</button><button class="btn btn-primary btn-sm" onclick="confirmAddTag('${taskId}')">Agregar</button></div></div>`;document.body.appendChild(tm);setTimeout(()=>document.getElementById('tag-name-input')?.focus(),50);}
async function confirmAddTag(taskId){const name=document.getElementById('tag-name-input')?.value.trim();if(!name){showToast('Ingresá un nombre','error');return;}const sel=document.querySelector('#tag-modal .color-dot-pick.selected');const color=sel?sel.style.background:TAG_COLORS[0];const task=state.tasks.find(t=>t.id===taskId);if(!task)return;if(!task.tags)task.tags=[];task.tags.push({name,color});await saveTask(task);document.getElementById('tag-modal')?.remove();refreshTagsEditor(task,taskId);}
async function removeTag(taskId,idx){const task=state.tasks.find(t=>t.id===taskId);if(!task)return;task.tags.splice(idx,1);await saveTask(task);refreshTagsEditor(task,taskId);}
function refreshTagsEditor(task,taskId){const editor=document.getElementById('tags-editor');if(editor)editor.innerHTML=task.tags.map((tg,i)=>`<span class="tag-pill" style="background:${tg.color}22;color:${tg.color}">${esc(tg.name)}<button class="tag-x" onclick="removeTag('${taskId}',${i})">×</button></span>`).join('')+`<button class="tag-add-btn" onclick="addTagPrompt('${taskId}')">+ Etiqueta</button>`;}

function renderComments(comments){if(!comments.length)return`<div style="font-size:11.5px;color:var(--text3);padding:5px 0">Sin comentarios aún.</div>`;return comments.map(c=>`<div class="comment-item"><div class="comment-avatar">L</div><div class="comment-bubble"><div class="comment-meta">${new Date(c.createdAt).toLocaleString('es-AR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div><div class="comment-text">${esc(c.text)}</div></div></div>`).join('');}
async function addComment(taskId){const input=document.getElementById('new-comment');const text=input.value.trim();if(!text)return;const task=state.tasks.find(t=>t.id===taskId);if(!task)return;task.comments.push({id:uid(),text,createdAt:new Date().toISOString()});await saveTask(task);input.value='';document.getElementById('comments-list').innerHTML=renderComments(task.comments);const cc=document.getElementById('comment-count');if(cc)cc.textContent=`(${task.comments.length})`;}
async function saveTaskDetail(taskId){const task=state.tasks.find(t=>t.id===taskId);if(!task)return;const title=document.getElementById('dt-title')?.value?.trim();if(title)task.title=title;task.status=document.getElementById('dt-status')?.value||task.status;task.priority=document.getElementById('dt-priority')?.value||task.priority;task.projectId=document.getElementById('dt-project')?.value||task.projectId;task.dueDate=document.getElementById('dt-due')?.value||'';task.dueTime=document.getElementById('dt-time')?.value||'';task.description=document.getElementById('dt-desc')?.value||'';await saveTask(task);render();}
// Confetti effect
function createConfetti(x,y){
  const colors=['#e53935','#fb8c00','#f9a825','#43a047','#1e88e5','#8e24aa','#ec407a'];
  for(let i=0;i<24;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=(x+Math.random()*40-20)+'px';
    c.style.top=(y+Math.random()*40-20)+'px';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDelay=(Math.random()*0.2)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),600);
  }
}

async function toggleDone(taskId,e){
  const task=state.tasks.find(t=>t.id===taskId);
  if(!task)return;
  const wasPending=task.status!=='completado';
  task.status=wasPending?'completado':'pendiente';
  await saveTask(task);
  render();
  if(wasPending){
    const rect=e?.target?.getBoundingClientRect();
    if(rect)createConfetti(rect.left+rect.width/2,rect.top+rect.height/2);
    showToast('✓ Tarea completada','success');
  }
}
async function deleteTask(taskId){state.tasks=state.tasks.filter(t=>t.id!==taskId);await deleteTaskDB(taskId);render();showToast('Tarea eliminada');}

/* PROJECT MODAL */
function openProjectModal(){createModal('Nuevo Espacio',`<div class="form-group"><label class="form-label">Nombre *</label><input class="form-input" id="p-name" placeholder="Ej: Trabajo, Ideas..." autofocus></div><div class="form-group"><label class="form-label">Color</label><div class="color-picker">${COLORS.map((c,i)=>`<div class="color-dot-pick ${i===0?'selected':''}" style="background:${c}" onclick="selectColor(this)"></div>`).join('')}</div></div>`,async()=>{const name=document.getElementById('p-name').value.trim();if(!name){showToast('Ingresá un nombre','error');return;}const sel=document.querySelector('.color-dot-pick.selected');const newSpace={id:uid(),name,color:sel?sel.style.background:COLORS[0]};state.projects.push(newSpace);await saveSpace(newSpace);closeModal();render();showToast('✓ Espacio creado','success');},'Crear espacio');}
function selectColor(el){document.querySelectorAll('.color-dot-pick').forEach(d=>d.classList.remove('selected'));el.classList.add('selected');}

/* BACKUP */
function exportBackup(){const data={version:3,exportedAt:new Date().toISOString(),projects:state.projects,tasks:state.tasks};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`click1986-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(a.href);showToast('✓ Backup exportado','success');}
function importBackup(){document.getElementById('import-file').click();}
async function handleImport(e){const file=e.target.files[0];if(!file)return;try{const text=await file.text();const data=JSON.parse(text);if(!data.projects||!data.tasks){showToast('Archivo inválido','error');return;}if(!confirm(`¿Importar ${data.projects.length} espacios y ${data.tasks.length} tareas?`))return;for(const p of data.projects){if(!state.projects.find(x=>x.id===p.id)){state.projects.push(p);await saveSpace(p);}}for(const t of data.tasks){if(!state.tasks.find(x=>x.id===t.id)){if(!t.subtasks)t.subtasks=[];if(!t.tags)t.tags=[];state.tasks.push(t);await saveTask(t);}}render();showToast(`✓ Importados: ${data.tasks.length} tareas`,'success');}catch(err){showToast('Error al importar','error');}e.target.value='';}

/* MODAL HELPERS */
function createModal(title,body,onConfirm,confirmText='Guardar'){const container=document.getElementById('modal-container');container.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-header"><div class="modal-title">${title}</div><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body">${body}</div><div class="modal-footer"><button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancelar</button><button class="btn btn-primary btn-sm" id="modal-confirm">${confirmText}</button></div></div></div>`;document.getElementById('modal-confirm').onclick=onConfirm;setTimeout(()=>{container.querySelectorAll('input[type="text"],input:not([type])').forEach(inp=>inp.addEventListener('keydown',e=>{if(e.key==='Enter')onConfirm();}));},50);}
function closeModal(){document.getElementById('modal-container').innerHTML='';}
function showToast(msg,type=''){const el=document.createElement('div');el.className=`toast ${type}`;el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2600);}

/* TELEGRAM */
async function sendTelegram(msg){try{await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:TG_CHAT,text:msg,parse_mode:'HTML'})});}catch(e){console.log('TG:',e);}}
function addMinutes(time,mins){const[h,m]=time.split(':').map(Number);const d=new Date(2000,0,1,h,m+mins);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
function checkDueTasks(mode='daily'){
  const now=new Date(),today=localDateStr(0),tomorrow=localDateStr(1);
  const currentTime=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  if(mode==='hourly'){const soon=state.tasks.filter(t=>t.dueDate===today&&t.dueTime&&t.status!=='completado'&&t.dueTime>=currentTime&&t.dueTime<=addMinutes(currentTime,15));if(soon.length){let msg=`⏰ <b>PRÓXIMAS A VENCER</b>\n`;soon.forEach(t=>{const p=getProject(t.projectId);msg+=`• ${t.title} — ${t.dueTime}${p?' ('+p.name+')':''}\n`;});sendTelegram(msg);}return;}
  const todayT=state.tasks.filter(t=>t.dueDate===today&&t.status!=='completado');
  const tomorrowT=state.tasks.filter(t=>t.dueDate===tomorrow&&t.status!=='completado');
  const overdueT=state.tasks.filter(t=>t.dueDate&&t.dueDate<today&&t.status!=='completado');
  let msg='';
  if(overdueT.length){msg+=`🔴 <b>VENCIDAS (${overdueT.length})</b>\n`;overdueT.forEach(t=>{const p=getProject(t.projectId);msg+=`• ${t.title}${p?' — '+p.name:''}\n`;});msg+='\n';}
  if(todayT.length){msg+=`🟡 <b>VENCEN HOY (${todayT.length})</b>\n`;todayT.forEach(t=>{const p=getProject(t.projectId);msg+=`• ${t.title}${t.dueTime?' '+t.dueTime:''}${p?' — '+p.name:''}\n`;});msg+='\n';}
  if(tomorrowT.length){msg+=`🔵 <b>VENCEN MAÑANA (${tomorrowT.length})</b>\n`;tomorrowT.forEach(t=>{const p=getProject(t.projectId);msg+=`• ${t.title}${t.dueTime?' '+t.dueTime:''}${p?' — '+p.name:''}\n`;});}
  if(msg)sendTelegram(`📋 <b>click.1986 — Resumen</b>\n\n`+msg);
}
async function sendWeeklySummary(){const today=localDateStr(0);const weekEnd=localDateStr(7);const pending=state.tasks.filter(t=>t.status!=='completado');const dueThisWeek=pending.filter(t=>t.dueDate&&t.dueDate>=today&&t.dueDate<=weekEnd);const overdue=pending.filter(t=>t.dueDate&&t.dueDate<today);let msg=`📅 <b>click.1986 — Resumen Semanal</b>\n\n📌 Tareas activas: <b>${pending.length}</b>\n⚠️ Vencidas: <b>${overdue.length}</b>\n📆 Esta semana: <b>${dueThisWeek.length}</b>\n\n`;if(dueThisWeek.length){msg+=`<b>Esta semana:</b>\n`;dueThisWeek.forEach(t=>{const p=getProject(t.projectId);msg+=`• ${t.title} — ${formatDate(t.dueDate,t.dueTime)}${p?' ('+p.name+')':''}\n`;});}sendTelegram(msg);}
function startNotificationScheduler(){
  const today=localDateStr(0);const last=localStorage.getItem('click1986_last_notif');
  if(last!==today){setTimeout(()=>{checkDueTasks('daily');localStorage.setItem('click1986_last_notif',today);},4000);}
  const dayOfWeek=new Date().getDay();const thisWeek=new Date().toISOString().slice(0,7)+'-W'+Math.ceil(new Date().getDate()/7);const lastWeekly=localStorage.getItem('click1986_last_weekly');
  if(dayOfWeek===1&&lastWeekly!==thisWeek){setTimeout(()=>{sendWeeklySummary();localStorage.setItem('click1986_last_weekly',thisWeek);},6000);}
  setInterval(()=>{checkDueTasks('hourly');},900000);
  setInterval(()=>{const now=localDateStr(0);const l=localStorage.getItem('click1986_last_notif');if(l!==now){checkDueTasks('daily');localStorage.setItem('click1986_last_notif',now);}},3600000);
}
window.enviarResumenTelegram=function(){checkDueTasks('daily');showToast('📨 Enviado a Telegram','success');}

/* SWIPE GESTURES FOR MOBILE */
let taskHammerInstances=new Map();
function initSwipeGestures(){
  if(typeof Hammer==='undefined')return;
  if(window.innerWidth>700)return;
  document.querySelectorAll('.task-card,.list-row').forEach(el=>{
    const id=el.dataset?.id||el.getAttribute('data-id');
    if(!id||taskHammerInstances.has(id))return;
    const hammer=new Hammer(el);
    hammer.on('panright',e=>{
      if(el.classList.contains('list-row')){
        el.style.transform=`translateX(${e.deltaX}px)`;
        el.style.transition='none';
        if(e.deltaX>80){
          const taskId=el.getAttribute('onclick')?.match(/openTaskDetail\('([^']+)'\)/)?.[1];
          if(taskId){el.style.transform='translateX(100%)';el.style.opacity='0';setTimeout(()=>{toggleDone(taskId,e);el.style.transform='';el.style.opacity='';},300);}
        }
      }
    });
    hammer.on('panleft',e=>{
      if(el.classList.contains('task-card')||el.classList.contains('list-row')){
        el.style.transform=`translateX(${e.deltaX}px)`;
        el.style.transition='none';
        if(e.deltaX<-80){
          const taskId=el.getAttribute('onclick')?.match(/openTaskDetail\('([^']+)'\)/)?.[1];
          if(taskId){el.style.transform='translateX(-100%)';el.style.opacity='0';setTimeout(()=>{deleteTask(taskId);el.style.transform='';el.style.opacity='';},300);}
        }
      }
    });
    hammer.on('panend',e=>{
      if(Math.abs(e.deltaX)<80){el.style.transform='';el.style.transition='all .15s';}
    });
    hammer.on('tap',()=>{el.style.transform='';el.style.transition='all .15s';});
    taskHammerInstances.set(id,hammer);
  });
}

/* INIT */
function updateClock(){
  const now=new Date();
  const time=now.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  const date=now.toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short'});
  const te=document.getElementById('clock-time');const de=document.getElementById('clock-date');
  if(te)te.textContent=time;if(de)de.textContent=date;
}
updateClock();setInterval(updateClock,1000);
loadState().then(()=>startNotificationScheduler());
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').catch(e=>console.log('SW:',e));});}
let deferredPrompt2;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt2=e;const topbar=document.querySelector('.topbar');if(topbar&&!document.getElementById('install-btn')){const btn=document.createElement('button');btn.id='install-btn';btn.className='btn btn-ghost btn-sm';btn.style.cssText='border-color:var(--accent);color:var(--accent)';btn.innerHTML='⬇';btn.onclick=()=>{deferredPrompt2.prompt();deferredPrompt2.userChoice.then(()=>{deferredPrompt2=null;btn.remove();});};topbar.insertBefore(btn,topbar.querySelector('.btn-primary'));}});
